name: MLX Swift Minimum Working Smoke

on:
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: mlx-swift-minimum-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: MLX Swift minimum working smoke on macOS
    runs-on: macos-15
    timeout-minutes: 60

    env:
      DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer
      NSUnbufferedIO: "YES"
      CLICOLOR: "1"

    steps:
      - name: Check out wrapper repository
        uses: actions/checkout@v5

      - name: Show runner and toolchain info
        shell: bash
        run: |
          set -euxo pipefail
          uname -a
          sw_vers
          sysctl -n machdep.cpu.brand_string || true
          xcode-select -p
          xcodebuild -version
          swift --version
          clang --version || true
          pwd
          ls -la

      - name: Clone mlx-swift with submodules
        shell: bash
        run: |
          set -euxo pipefail
          git clone --recursive https://github.com/ml-explore/mlx-swift.git
          cd mlx-swift
          git rev-parse HEAD
          git status
          git log -1 --stat
          git submodule status

      - name: Verify required vendored sources exist
        shell: bash
        run: |
          set -euxo pipefail
          cd mlx-swift
          test -d Source/Cmlx/mlx
          test -d Source/Cmlx/mlx-c
          test -f Source/Cmlx/mlx/mlx/backend/cpu/compiled.cpp
          echo "Required vendored sources are present."

      - name: Show available Xcode schemes
        shell: bash
        run: |
          set -euxo pipefail
          cd mlx-swift
          xcodebuild -list -project mlx-swift.xcodeproj

      - name: Run upstream package tests with xcodebuild
        shell: bash
        run: |
          set -euxo pipefail
          cd mlx-swift
          xcodebuild \
            test \
            -project mlx-swift.xcodeproj \
            -scheme mlx-swift-Package \
            -destination 'platform=OS X' \
            -derivedDataPath "$PWD/DerivedData" \
            -resultBundlePath "$PWD/MLXSwiftPackageTests.xcresult" \
            -showBuildTimingSummary

      - name: Show compact build outputs
        if: always()
        shell: bash
        run: |
          set -euxo pipefail
          cd mlx-swift
          du -sh DerivedData || true
          ls -lah MLXSwiftPackageTests.xcresult || true

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mlx-swift-minimum-working-artifacts
          if-no-files-found: ignore
          path: |
            mlx-swift/MLXSwiftPackageTests.xcresult
