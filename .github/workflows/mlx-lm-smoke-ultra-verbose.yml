name: MLX Swift Core Proven Smoke

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  mlx-swift-core:
    name: MLX Swift core proven smoke on macOS
    runs-on: macos-15
    timeout-minutes: 90

    env:
      NSUnbufferedIO: "YES"
      PYTHONUNBUFFERED: "1"
      FORCE_COLOR: "1"
      CI: "1"

    steps:
      - name: Checkout workflow repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Toolchain and machine info
        run: |
          set +e
          echo "=== PWD ==="
          pwd
          echo

          echo "=== DATE ==="
          date -u
          echo

          echo "=== sw_vers ==="
          sw_vers
          echo

          echo "=== uname ==="
          uname -a
          echo

          echo "=== xcode-select ==="
          xcode-select -p
          echo

          echo "=== xcodebuild -version ==="
          xcodebuild -version
          echo

          echo "=== swift --version ==="
          swift --version
          echo

          echo "=== clang --version ==="
          clang --version
          echo

          echo "=== xcrun --show-sdk-path ==="
          xcrun --show-sdk-path
          echo

          echo "=== xcodebuild -showsdks ==="
          xcodebuild -showsdks
          echo

          echo "=== env | sort ==="
          env | sort
          echo

      - name: Bootstrap mlx-swift
        run: |
          set -euxo pipefail
          rm -rf mlx-swift
          git clone --depth=1 https://github.com/ml-explore/mlx-swift.git mlx-swift

          echo "=== TOP LEVEL ==="
          ls -la
          echo

          echo "=== MLX SWIFT TOP LEVEL ==="
          ls -la mlx-swift
          echo

      - name: Repository assertions
        run: |
          set +e
          echo "=== ASSERTING IMPORTANT PATHS ==="
          for p in \
            "." \
            "./mlx-swift" \
            "./mlx-swift/Package.swift" \
            "./mlx-swift/Source" \
            "./mlx-swift/Source/Cmlx" \
            "./mlx-swift/Tests"
          do
            if [ -e "$p" ]; then
              echo "FOUND: $p"
            else
              echo "MISSING: $p"
            fi
          done
          echo

          echo "=== MLX SWIFT TREE (FIRST 400 PATHS) ==="
          find ./mlx-swift | sed -n '1,400p'
          echo

          echo "=== LOOK FOR compiled_conditional.cpp ==="
          find ./mlx-swift -name 'compiled_conditional.cpp' -print
          echo

          echo "=== LOOK FOR compiled.cpp ==="
          find ./mlx-swift -name 'compiled.cpp' -print
          echo

      - name: Package metadata discovery
        working-directory: mlx-swift
        run: |
          set +e
          echo "=== swift package describe ==="
          swift package describe 2>&1 | tee ../swift-package-describe.log
          echo

          echo "=== swift package dump-package ==="
          swift package dump-package 2>&1 | tee ../swift-package-dump-package.log
          echo

          echo "=== swift package tools-version ==="
          swift package tools-version 2>&1 | tee ../swift-package-tools-version.log
          echo

      - name: Xcode scheme discovery
        working-directory: mlx-swift
        run: |
          set +e
          echo "=== xcodebuild -list ==="
          xcodebuild -list 2>&1 | tee ../xcodebuild-list.log
          echo

          echo "=== xcodebuild -list -json ==="
          xcodebuild -list -json 2>&1 | tee ../xcodebuild-list-json.log
          echo

      - name: SwiftPM build diagnostic
        working-directory: mlx-swift
        continue-on-error: true
        run: |
          set +e
          echo "=== swift build -v ==="
          swift build -v 2>&1 | tee ../swift-build-v.log
          status=${PIPESTATUS[0]}
          echo "swift build exit status: $status"
          exit 0

      - name: Proven xcode test build using working scheme
        id: proven_test
        working-directory: mlx-swift
        run: |
          set -o pipefail
          rm -rf DerivedData

          echo "=== RUNNING THE KNOWN-WORKING SCHEME ==="
          echo "Using MLXSwiftPackageTests instead of mlx-swift-Package."
          echo "Reason: mlx-swift-Package is hitting compiled_conditional.cpp path issues."
          echo

          xcodebuild \
            -scheme MLXSwiftPackageTests \
            -destination 'platform=macOS,arch=arm64' \
            -derivedDataPath DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            test 2>&1 | tee ../xcodebuild-proven-test.log

      - name: DerivedData and artifact scan
        if: always()
        run: |
          set +e
          echo "=== DERIVED DATA TREE ==="
          find mlx-swift/DerivedData | sed -n '1,600p' || true
          echo

          echo "=== XCRESULTS ==="
          find . -name '*.xcresult' -print
          echo

          echo "=== XCTEST BUNDLES ==="
          find . -name '*.xctest' -print
          echo

          echo "=== METALLIB FILES ==="
          find . -name '*.metallib' -print
          echo

          echo "=== APPS / BINARIES / DYLIBS ==="
          find . \( -name '*.app' -o -name '*.dylib' -o -perm -111 \) | sed -n '1,400p'
          echo

      - name: Scaffold minimal executable smoke
        if: always()
        run: |
          set +e
          rm -rf smoke-min
          mkdir -p smoke-min/Sources/SmokeMin

          cat > smoke-min/Package.swift <<'EOF'
          // swift-tools-version: 6.0
          import PackageDescription

          let package = Package(
              name: "SmokeMin",
              platforms: [
                  .macOS(.v14)
              ],
              dependencies: [
                  .package(path: "../mlx-swift")
              ],
              targets: [
                  .executableTarget(
                      name: "SmokeMin",
                      dependencies: [
                          .product(name: "MLX", package: "mlx-swift"),
                          .product(name: "MLXNN", package: "mlx-swift")
                      ],
                      path: "Sources/SmokeMin"
                  )
              ]
          )
          EOF

          cat > smoke-min/Sources/SmokeMin/main.swift <<'EOF'
          import Foundation
          import MLX
          import MLXNN

          func log(_ s: String) {
              print(s)
              fflush(stdout)
          }

          log("=== SMOKE MIN START ===")

          let a = MLXArray([1.0, 2.0, 3.0])
          let b = MLXArray([10.0, 20.0, 30.0])

          log("a = \(a)")
          log("b = \(b)")

          let c = a + b
          log("a + b = \(c)")

          let d = a * b
          log("a * b = \(d)")

          let e = matmul(
              MLXArray([[1.0, 2.0], [3.0, 4.0]]),
              MLXArray([[5.0, 6.0], [7.0, 8.0]])
          )
          log("matmul = \(e)")

          let linear = Linear(inputDimensions: 2, outputDimensions: 2)
          let x = MLXArray([[1.0, 2.0]])
          let y = linear(x)
          log("linear(x) = \(y)")

          eval(c, d, e, y)
          log("=== SMOKE MIN END ===")
          EOF

          echo "=== smoke-min tree ==="
          find smoke-min | sed -n '1,200p'

      - name: Resolve minimal smoke
        if: always()
        continue-on-error: true
        working-directory: smoke-min
        run: |
          set +e
          echo "=== swift package describe (smoke-min) ==="
          swift package describe 2>&1 | tee ../smoke-min-describe.log
          echo

          echo "=== swift package resolve (smoke-min) ==="
          swift package resolve 2>&1 | tee ../smoke-min-resolve.log
          status=${PIPESTATUS[0]}
          echo "smoke-min resolve exit status: $status"
          exit 0

      - name: Build minimal smoke
        if: always()
        continue-on-error: true
        working-directory: smoke-min
        run: |
          set +e
          echo "=== swift build -v (smoke-min) ==="
          swift build -v 2>&1 | tee ../smoke-min-build.log
          status=${PIPESTATUS[0]}
          echo "smoke-min build exit status: $status"
          echo

          echo "=== smoke-min .build tree ==="
          find .build | sed -n '1,500p' || true
          exit 0

      - name: Run minimal smoke
        if: always()
        continue-on-error: true
        working-directory: smoke-min
        run: |
          set +e
          echo "=== locating SmokeMin binary ==="
          BIN="$(find .build -type f -name SmokeMin | head -n 1)"
          echo "BIN=$BIN"
          echo

          echo "=== locating metallib files ==="
          find .build -name '*.metallib' -print
          echo

          if [ -z "$BIN" ]; then
            echo "SmokeMin binary not found."
            exit 0
          fi

          if [ ! -x "$BIN" ]; then
            echo "SmokeMin binary exists but is not executable."
            ls -l "$BIN" || true
            exit 0
          fi

          echo "=== running SmokeMin ==="
          "$BIN" 2>&1 | tee ../smoke-min-run.log
          status=${PIPESTATUS[0]}
          echo "SmokeMin runtime exit status: $status"
          exit 0

      - name: Final summary
        if: always()
        run: |
          set +e
          echo "=== FINAL SUMMARY ==="
          echo "Proven test step outcome: ${{ steps.proven_test.outcome }}"
          echo
          echo "This workflow intentionally uses MLXSwiftPackageTests."
          echo "It avoids mlx-swift-Package because that path is hitting compiled_conditional.cpp include failures."
          echo

          echo "=== LOG FILES ==="
          find . -maxdepth 2 -name '*.log' -print | sort
          echo

      - name: Upload diagnostic artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mlx-swift-core-proven-diagnostics
          if-no-files-found: warn
          path: |
            *.log
            mlx-swift/DerivedData/**
            smoke-min/.build/**
            smoke-min/Package.swift
            smoke-min/Sources/**
            **/*.xcresult
