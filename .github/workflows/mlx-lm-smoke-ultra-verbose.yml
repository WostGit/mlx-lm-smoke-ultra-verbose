name: MLX Swift Dynamic Scheme Probe Ultra Verbose

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  mlx-swift-probe:
    name: MLX Swift dynamic scheme probe on macOS
    runs-on: macos-15
    timeout-minutes: 90

    env:
      NSUnbufferedIO: "YES"
      PYTHONUNBUFFERED: "1"
      FORCE_COLOR: "1"
      CI: "1"

    steps:
      - name: Checkout workflow repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Toolchain info
        run: |
          set +e
          echo "=== DATE ==="
          date -u
          echo

          echo "=== sw_vers ==="
          sw_vers
          echo

          echo "=== uname ==="
          uname -a
          echo

          echo "=== xcode-select ==="
          xcode-select -p
          echo

          echo "=== xcodebuild -version ==="
          xcodebuild -version
          echo

          echo "=== swift --version ==="
          swift --version
          echo

          echo "=== xcrun --show-sdk-path ==="
          xcrun --show-sdk-path
          echo

      - name: Clone mlx-swift
        run: |
          set -euxo pipefail
          rm -rf mlx-swift
          git clone --depth=1 https://github.com/ml-explore/mlx-swift.git mlx-swift

          echo "=== TOP LEVEL ==="
          ls -la
          echo

          echo "=== MLX SWIFT TOP LEVEL ==="
          ls -la mlx-swift
          echo

      - name: Assert important paths
        run: |
          set +e
          echo "=== IMPORTANT PATHS ==="
          for p in \
            "./mlx-swift" \
            "./mlx-swift/Package.swift" \
            "./mlx-swift/Source" \
            "./mlx-swift/Source/Cmlx" \
            "./mlx-swift/Tests"
          do
            if [ -e "$p" ]; then
              echo "FOUND: $p"
            else
              echo "MISSING: $p"
            fi
          done
          echo

          echo "=== LOOK FOR compiled_conditional.cpp ==="
          find ./mlx-swift -name 'compiled_conditional.cpp' -print
          echo

          echo "=== LOOK FOR compiled.cpp ==="
          find ./mlx-swift -name 'compiled.cpp' -print
          echo

      - name: Package metadata
        working-directory: mlx-swift
        run: |
          set +e
          echo "=== swift package describe ==="
          swift package describe 2>&1 | tee ../swift-package-describe.log
          echo

          echo "=== swift package dump-package ==="
          swift package dump-package 2>&1 | tee ../swift-package-dump-package.log
          echo

          echo "=== swift package tools-version ==="
          swift package tools-version 2>&1 | tee ../swift-package-tools-version.log
          echo

      - name: Discover Xcode schemes
        id: discover
        working-directory: mlx-swift
        run: |
          set -o pipefail
          xcodebuild -list -json 2>&1 | tee ../xcodebuild-list-json.log

          python3 - <<'PY' > ../detected_scheme.txt
          import json

          path = "../xcodebuild-list-json.log"
          text = open(path, "r", encoding="utf-8").read()

          start = text.find("{")
          if start == -1:
              print("")
              raise SystemExit(0)

          try:
              data = json.loads(text[start:])
          except Exception:
              print("")
              raise SystemExit(0)

          workspace = data.get("workspace", data.get("project", {}))
          schemes = workspace.get("schemes", []) if isinstance(workspace, dict) else []

          preferred = [
              "MLXSwiftPackageTests",
              "mlx-swift-Package",
              "MLXTests",
          ]

          chosen = ""
          for name in preferred:
              if name in schemes:
                  chosen = name
                  break

          if not chosen and schemes:
              chosen = schemes[0]

          print(chosen)
          PY

          echo "=== RAW SCHEME LIST ==="
          cat ../xcodebuild-list-json.log
          echo

          SCHEME="$(cat ../detected_scheme.txt)"
          echo "DETECTED_SCHEME=$SCHEME" | tee -a "$GITHUB_ENV"

          if [ -z "$SCHEME" ]; then
            echo "No Xcode scheme detected."
          else
            echo "Chosen scheme: $SCHEME"
          fi

      - name: SwiftPM build diagnostic
        working-directory: mlx-swift
        continue-on-error: true
        run: |
          set +e
          echo "=== swift build -v ==="
          swift build -v 2>&1 | tee ../swift-build-v.log
          status=${PIPESTATUS[0]}
          echo "swift build exit status: $status"
          exit 0

      - name: Build chosen scheme
        id: build_scheme
        if: env.DETECTED_SCHEME != ''
        working-directory: mlx-swift
        continue-on-error: true
        run: |
          set +e
          rm -rf DerivedData

          echo "=== BUILDING CHOSEN SCHEME ==="
          echo "Scheme: $DETECTED_SCHEME"
          echo

          xcodebuild \
            -scheme "$DETECTED_SCHEME" \
            -destination 'platform=macOS,arch=arm64' \
            -derivedDataPath DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            build 2>&1 | tee ../xcodebuild-chosen-build.log

          status=${PIPESTATUS[0]}
          echo "chosen scheme build exit status: $status"
          exit 0

      - name: Test chosen scheme
        id: test_scheme
        if: env.DETECTED_SCHEME != ''
        working-directory: mlx-swift
        continue-on-error: true
        run: |
          set +e
          echo "=== TESTING CHOSEN SCHEME ==="
          echo "Scheme: $DETECTED_SCHEME"
          echo

          xcodebuild \
            -scheme "$DETECTED_SCHEME" \
            -destination 'platform=macOS,arch=arm64' \
            -derivedDataPath DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            test 2>&1 | tee ../xcodebuild-chosen-test.log

          status=${PIPESTATUS[0]}
          echo "chosen scheme test exit status: $status"
          exit 0

      - name: Minimal executable scaffold
        if: always()
        run: |
          set +e
          rm -rf smoke-min
          mkdir -p smoke-min/Sources/SmokeMin

          cat > smoke-min/Package.swift <<'EOF'
          // swift-tools-version: 6.0
          import PackageDescription

          let package = Package(
              name: "SmokeMin",
              platforms: [
                  .macOS(.v14)
              ],
              dependencies: [
                  .package(path: "../mlx-swift")
              ],
              targets: [
                  .executableTarget(
                      name: "SmokeMin",
                      dependencies: [
                          .product(name: "MLX", package: "mlx-swift"),
                          .product(name: "MLXNN", package: "mlx-swift")
                      ],
                      path: "Sources/SmokeMin"
                  )
              ]
          )
          EOF

          cat > smoke-min/Sources/SmokeMin/main.swift <<'EOF'
          import Foundation
          import MLX
          import MLXNN

          func log(_ s: String) {
              print(s)
              fflush(stdout)
          }

          log("=== SMOKE MIN START ===")

          let a = MLXArray([1.0, 2.0, 3.0])
          let b = MLXArray([10.0, 20.0, 30.0])

          log("a = \(a)")
          log("b = \(b)")
          log("a + b = \(a + b)")
          log("a * b = \(a * b)")

          let e = matmul(
              MLXArray([[1.0, 2.0], [3.0, 4.0]]),
              MLXArray([[5.0, 6.0], [7.0, 8.0]])
          )
          log("matmul = \(e)")

          let linear = Linear(inputDimensions: 2, outputDimensions: 2)
          let y = linear(MLXArray([[1.0, 2.0]]))
          log("linear = \(y)")

          eval(e, y)
          log("=== SMOKE MIN END ===")
          EOF

      - name: Build minimal executable
        if: always()
        continue-on-error: true
        working-directory: smoke-min
        run: |
          set +e
          swift build -v 2>&1 | tee ../smoke-min-build.log
          status=${PIPESTATUS[0]}
          echo "smoke-min build exit status: $status"
          exit 0

      - name: Run minimal executable
        if: always()
        continue-on-error: true
        working-directory: smoke-min
        run: |
          set +e
          BIN="$(find .build -type f -name SmokeMin | head -n 1)"
          echo "BIN=$BIN" | tee ../smoke-min-run.log

          echo "=== metallib files ===" | tee -a ../smoke-min-run.log
          find .build -name '*.metallib' -print | tee -a ../smoke-min-run.log

          if [ -n "$BIN" ] && [ -x "$BIN" ]; then
            "$BIN" 2>&1 | tee -a ../smoke-min-run.log
          else
            echo "SmokeMin binary missing or not executable" | tee -a ../smoke-min-run.log
          fi

          exit 0

      - name: Dump artifacts and logs
        if: always()
        run: |
          set +e
          echo "=== XCRESULTS ==="
          find . -name '*.xcresult' -print
          echo

          echo "=== XCTEST BUNDLES ==="
          find . -name '*.xctest' -print
          echo

          echo "=== METALLIB FILES ==="
          find . -name '*.metallib' -print
          echo

          echo "=== DERIVEDDATA TREE ==="
          find mlx-swift/DerivedData | sed -n '1,600p' || true
          echo

          echo "=== LOG FILES ==="
          find . -maxdepth 2 -name '*.log' -print | sort
          echo

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mlx-swift-dynamic-probe-diagnostics
          if-no-files-found: warn
          path: |
            *.log
            detected_scheme.txt
            mlx-swift/DerivedData/**
            smoke-min/.build/**
            smoke-min/Package.swift
            smoke-min/Sources/**
            **/*.xcresult
