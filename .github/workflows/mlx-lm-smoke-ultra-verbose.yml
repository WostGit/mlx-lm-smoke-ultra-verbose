name: MLX Swift Qwen2 Text-Only Smoke

on:
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: mlx-swift-qwen2-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: MLX Swift Qwen2 text-only smoke on macOS
    runs-on: macos-15
    timeout-minutes: 90

    env:
      DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer
      NSUnbufferedIO: "YES"
      CLICOLOR: "1"

    steps:
      - name: Check out wrapper repository
        uses: actions/checkout@v5

      - name: Show runner and toolchain info
        shell: bash
        run: |
          set -euxo pipefail
          uname -a
          sw_vers
          sysctl -n machdep.cpu.brand_string || true
          xcode-select -p
          xcodebuild -version
          swift --version
          pwd
          ls -la

      - name: Clone mlx-swift with submodules
        shell: bash
        run: |
          set -euxo pipefail
          git clone --recursive https://github.com/ml-explore/mlx-swift.git
          cd mlx-swift
          git rev-parse HEAD
          git submodule status
          test -f Source/Cmlx/mlx/mlx/backend/cpu/compiled.cpp

      - name: Run upstream mlx-swift package tests
        shell: bash
        run: |
          set -euxo pipefail
          cd mlx-swift
          xcodebuild \
            test \
            -scheme mlx-swift-Package \
            -destination 'platform=macOS' \
            -derivedDataPath "$PWD/DerivedData" \
            -resultBundlePath "$PWD/MLXSwiftPackageTests.xcresult" \
            -showBuildTimingSummary

      - name: Create text-only Qwen smoke package
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p smoke-qwen
          cd smoke-qwen

          cat > Package.swift <<'SWIFT'
          // swift-tools-version: 6.0
          import PackageDescription

          let package = Package(
              name: "SmokeQwen",
              platforms: [.macOS(.v14)],
              dependencies: [
                  .package(url: "https://github.com/ml-explore/mlx-swift-lm", from: "3.31.3"),
                  .package(url: "https://github.com/ml-explore/swift-tokenizers-mlx", branch: "main"),
                  .package(url: "https://github.com/ml-explore/swift-hf-api-mlx", branch: "main")
              ],
              targets: [
                  .executableTarget(
                      name: "SmokeQwen",
                      dependencies: [
                          .product(name: "MLXLLM", package: "mlx-swift-lm"),
                          .product(name: "MLXLMTokenizers", package: "swift-tokenizers-mlx"),
                          .product(name: "MLXLMHFAPI", package: "swift-hf-api-mlx")
                      ]
                  )
              ]
          )
          SWIFT

          mkdir -p Sources/SmokeQwen
          cat > Sources/SmokeQwen/main.swift <<'SWIFT'
          import Foundation
          import MLXLLM
          import MLXLMCommon
          import MLXLMTokenizers
          import MLXLMHFAPI

          print("Imported MLXLLM integrations successfully.")
          print("About to resolve a Qwen2-family model identifier.")
          print("Target model: mlx-community/Qwen2.5-0.5B-Instruct-4bit")
          print("Text-only smoke package compiled and linked.")
          SWIFT

      - name: Resolve text-only smoke package
        shell: bash
        run: |
          set -euxo pipefail
          cd smoke-qwen
          swift package resolve

      - name: Build text-only smoke package
        shell: bash
        run: |
          set -euxo pipefail
          cd smoke-qwen
          swift build -v

      - name: Run text-only smoke package
        shell: bash
        run: |
          set -euxo pipefail
          cd smoke-qwen
          swift run -v

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mlx-swift-qwen2-text-only-artifacts
          if-no-files-found: ignore
          path: |
            mlx-swift/MLXSwiftPackageTests.xcresult
            smoke-qwen/.build
