name: MLX Swift Historical Ref Probe Ultra Verbose

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  probe-historical-refs:
    name: Probe mlx-swift refs for working scheme on macOS
    runs-on: macos-15
    timeout-minutes: 180

    strategy:
      fail-fast: false
      matrix:
        ref:
          - main
          - 0.31.3
          - 0.31.2
          - 0.31.1
          - 0.31.0
          - 0.30.0

    env:
      NSUnbufferedIO: "YES"
      PYTHONUNBUFFERED: "1"
      FORCE_COLOR: "1"
      CI: "1"

    steps:
      - name: Checkout workflow repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Toolchain and machine info
        shell: bash
        run: |
          set +e
          mkdir -p logs artifacts

          {
            echo "=== MATRIX REF ==="
            echo "${{ matrix.ref }}"
            echo

            echo "=== DATE UTC ==="
            date -u
            echo

            echo "=== PWD ==="
            pwd
            echo

            echo "=== sw_vers ==="
            sw_vers
            echo

            echo "=== uname -a ==="
            uname -a
            echo

            echo "=== xcode-select -p ==="
            xcode-select -p
            echo

            echo "=== xcodebuild -version ==="
            xcodebuild -version
            echo

            echo "=== swift --version ==="
            swift --version
            echo

            echo "=== clang --version ==="
            clang --version
            echo

            echo "=== xcrun --show-sdk-path ==="
            xcrun --show-sdk-path
            echo

            echo "=== env | sort ==="
            env | sort
            echo
          } | tee "logs/00-toolchain-${{ matrix.ref }}.log"

      - name: Clone mlx-swift at target ref
        shell: bash
        run: |
          set -euxo pipefail
          rm -rf mlx-swift
          git clone https://github.com/ml-explore/mlx-swift.git mlx-swift
          cd mlx-swift
          git fetch --tags --force
          git checkout "${{ matrix.ref }}"

          {
            echo "=== CHECKED OUT REF ==="
            echo "${{ matrix.ref }}"
            echo

            echo "=== RESOLVED HEAD ==="
            git rev-parse HEAD
            echo

            echo "=== LAST COMMIT ==="
            git log -1 --decorate --stat
            echo
          } | tee "../logs/01-clone-${{ matrix.ref }}.log"

      - name: Repository truth dump
        shell: bash
        run: |
          set +e
          {
            echo "=== IMPORTANT PATHS ==="
            for p in \
              "./mlx-swift" \
              "./mlx-swift/Package.swift" \
              "./mlx-swift/Source" \
              "./mlx-swift/Source/Cmlx" \
              "./mlx-swift/Tests" \
              "./mlx-swift/Source/Cmlx/mlx-conditional/compiled_conditional.cpp"
            do
              if [ -e "$p" ]; then
                echo "FOUND: $p"
              else
                echo "MISSING: $p"
              fi
            done
            echo

            echo "=== FIRST 500 PATHS UNDER mlx-swift ==="
            find ./mlx-swift | sed -n '1,500p'
            echo

            echo "=== FIND compiled_conditional.cpp ==="
            find ./mlx-swift -name 'compiled_conditional.cpp' -print
            echo

            echo "=== FIND compiled.cpp ==="
            find ./mlx-swift -name 'compiled.cpp' -print
            echo

            echo "=== GREP Package.swift for schemes/excludes/Cmlx ==="
            grep -nE 'exclude:|Cmlx|compiled_conditional|compiled\.cpp|MLXSwiftPackageTests|mlx-swift-Package' ./mlx-swift/Package.swift || true
            echo

            echo "=== Package.swift HEAD 400 lines ==="
            sed -n '1,400p' ./mlx-swift/Package.swift
            echo
          } | tee "logs/02-repo-truth-${{ matrix.ref }}.log"

      - name: SwiftPM metadata
        shell: bash
        working-directory: mlx-swift
        run: |
          set +e
          swift package describe 2>&1 | tee "../logs/03-swift-package-describe-${{ matrix.ref }}.log"
          swift package dump-package 2>&1 | tee "../logs/03-swift-package-dump-package-${{ matrix.ref }}.log"
          swift package tools-version 2>&1 | tee "../logs/03-swift-package-tools-version-${{ matrix.ref }}.log"
          swift package resolve 2>&1 | tee "../logs/03-swift-package-resolve-${{ matrix.ref }}.log"
          swift build -v 2>&1 | tee "../logs/03-swift-build-v-${{ matrix.ref }}.log"
          exit 0

      - name: Discover Xcode schemes
        id: discover
        shell: bash
        working-directory: mlx-swift
        run: |
          set -o pipefail
          xcodebuild -list 2>&1 | tee "../logs/04-xcodebuild-list-${{ matrix.ref }}.log"
          xcodebuild -list -json 2>&1 | tee "../logs/04-xcodebuild-list-json-${{ matrix.ref }}.log"

          python3 - <<'PY'
          import json
          import os

          ref = os.environ["REF_NAME"]
          path = f"../logs/04-xcodebuild-list-json-{ref}.log"
          txt = open(path, "r", encoding="utf-8", errors="replace").read()
          start = txt.find("{")
          schemes = []

          if start != -1:
              try:
                  obj = json.loads(txt[start:])
                  root = obj.get("project") or obj.get("workspace") or {}
                  schemes = root.get("schemes", []) or []
              except Exception:
                  schemes = []

          with open(f"../artifacts/schemes-{ref}.txt", "w", encoding="utf-8") as f:
              for s in schemes:
                  f.write(s + "\n")

          repro = "MLXSwiftPackageTests" if "MLXSwiftPackageTests" in schemes else ""
          current = "mlx-swift-Package" if "mlx-swift-Package" in schemes else ""
          if not current and schemes:
              current = schemes[0]

          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as f:
              f.write(f"REPRO_SCHEME={repro}\n")
              f.write(f"CURRENT_SCHEME={current}\n")

          print("schemes =", schemes)
          print("REPRO_SCHEME =", repro)
          print("CURRENT_SCHEME =", current)
          PY
        env:
          REF_NAME: ${{ matrix.ref }}

      - name: Emit scheme summary
        shell: bash
        run: |
          set +e
          {
            echo "=== SCHEME SUMMARY FOR REF ${{ matrix.ref }} ==="
            echo "REPRO_SCHEME=${REPRO_SCHEME:-}"
            echo "CURRENT_SCHEME=${CURRENT_SCHEME:-}"
            echo
            echo "=== RAW SCHEMES FILE ==="
            cat "artifacts/schemes-${{ matrix.ref }}.txt" 2>/dev/null || true
            echo
          } | tee "logs/05-scheme-summary-${{ matrix.ref }}.log"

      - name: Run candidate historic scheme
        if: env.REPRO_SCHEME != ''
        shell: bash
        working-directory: mlx-swift
        continue-on-error: true
        run: |
          set +e
          rm -rf DerivedDataRepro

          {
            echo "=== RUNNING HISTORIC CANDIDATE SCHEME ==="
            echo "REF=${{ matrix.ref }}"
            echo "SCHEME=$REPRO_SCHEME"
            echo
          } | tee "../logs/06-repro-intro-${{ matrix.ref }}.log"

          xcodebuild \
            -scheme "$REPRO_SCHEME" \
            -destination 'platform=macOS,arch=arm64' \
            -derivedDataPath DerivedDataRepro \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            test 2>&1 | tee "../logs/06-repro-xcodebuild-${{ matrix.ref }}.log"

          status=${PIPESTATUS[0]}
          echo "$status" > "../artifacts/repro-exit-status-${{ matrix.ref }}.txt"
          exit 0

      - name: Record missing historic scheme
        if: env.REPRO_SCHEME == ''
        shell: bash
        run: |
          set +e
          {
            echo "=== HISTORIC SCHEME ABSENT ==="
            echo "REF=${{ matrix.ref }}"
            echo "MLXSwiftPackageTests is not present at this ref/layout."
          } | tee "logs/06-repro-missing-${{ matrix.ref }}.log"

      - name: Run current detected scheme
        if: env.CURRENT_SCHEME != ''
        shell: bash
        working-directory: mlx-swift
        continue-on-error: true
        run: |
          set +e
          rm -rf DerivedDataCurrent

          {
            echo "=== RUNNING CURRENT DETECTED SCHEME ==="
            echo "REF=${{ matrix.ref }}"
            echo "SCHEME=$CURRENT_SCHEME"
            echo
          } | tee "../logs/07-current-intro-${{ matrix.ref }}.log"

          xcodebuild \
            -scheme "$CURRENT_SCHEME" \
            -destination 'platform=macOS,arch=arm64' \
            -derivedDataPath DerivedDataCurrent \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            test 2>&1 | tee "../logs/07-current-xcodebuild-${{ matrix.ref }}.log"

          status=${PIPESTATUS[0]}
          echo "$status" > "../artifacts/current-exit-status-${{ matrix.ref }}.txt"
          exit 0

      - name: Analyze logs for this ref
        if: always()
        shell: bash
        run: |
          set +e

          python3 - <<'PY'
          import os

          ref = os.environ["REF_NAME"]
          pairs = [
              ("repro", f"logs/06-repro-xcodebuild-{ref}.log"),
              ("current", f"logs/07-current-xcodebuild-{ref}.log"),
          ]

          os.makedirs("artifacts", exist_ok=True)

          for label, path in pairs:
              out = [f"=== ANALYSIS FOR {label.upper()} @ {ref} ==="]
              if not os.path.exists(path):
                  out.append("log missing")
                  open(f"artifacts/{label}-analysis-{ref}.txt", "w", encoding="utf-8").write("\n".join(out) + "\n")
                  continue

              txt = open(path, "r", encoding="utf-8", errors="replace").read().splitlines()

              invalid = [line for line in txt if "Invalid Exclude" in line]
              fatal = [line for line in txt if "fatal error:" in line]
              build_failed = [line for line in txt if "** BUILD FAILED **" in line]
              test_failed = [line for line in txt if "** TEST FAILED **" in line]
              scheme_missing = [line for line in txt if "does not contain a scheme named" in line]
              success_tests = [line for line in txt if "Executed " in line and "tests" in line and "0 failures" in line]

              out.append(f"invalid exclude count: {len(invalid)}")
              out.append(f"fatal error count: {len(fatal)}")
              out.append(f"build failed markers: {len(build_failed)}")
              out.append(f"test failed markers: {len(test_failed)}")
              out.append(f"missing scheme markers: {len(scheme_missing)}")
              out.append(f"successful test summary markers: {len(success_tests)}")
              out.append("")

              if invalid:
                  out.append("FIRST 20 INVALID EXCLUDE LINES:")
                  out.extend(invalid[:20])
                  out.append("")
              if fatal:
                  out.append("FIRST 20 FATAL ERROR LINES:")
                  out.extend(fatal[:20])
                  out.append("")
              if scheme_missing:
                  out.append("SCHEME-MISSING LINES:")
                  out.extend(scheme_missing[:20])
                  out.append("")
              if success_tests:
                  out.append("SUCCESS TEST SUMMARY LINES:")
                  out.extend(success_tests[:20])
                  out.append("")

              open(f"artifacts/{label}-analysis-{ref}.txt", "w", encoding="utf-8").write("\n".join(out) + "\n")
          PY
        env:
          REF_NAME: ${{ matrix.ref }}

      - name: Emit ref summary
        if: always()
        shell: bash
        run: |
          set +e
          {
            echo "=== REF SUMMARY: ${{ matrix.ref }} ==="
            echo "REPRO_SCHEME=${REPRO_SCHEME:-}"
            echo "CURRENT_SCHEME=${CURRENT_SCHEME:-}"
            echo

            echo "=== REPRO ANALYSIS ==="
            cat "artifacts/repro-analysis-${{ matrix.ref }}.txt" 2>/dev/null || true
            echo

            echo "=== CURRENT ANALYSIS ==="
            cat "artifacts/current-analysis-${{ matrix.ref }}.txt" 2>/dev/null || true
            echo
          } | tee "logs/08-ref-summary-${{ matrix.ref }}.log"

      - name: Minimal SwiftPM smoke scaffold
        if: always()
        shell: bash
        run: |
          set +e
          rm -rf smoke-min
          mkdir -p smoke-min/Sources/SmokeMin

          cat > smoke-min/Package.swift <<'EOF'
          // swift-tools-version: 6.0
          import PackageDescription

          let package = Package(
              name: "SmokeMin",
              platforms: [
                  .macOS(.v14)
              ],
              dependencies: [
                  .package(path: "../mlx-swift")
              ],
              targets: [
                  .executableTarget(
                      name: "SmokeMin",
                      dependencies: [
                          .product(name: "MLX", package: "mlx-swift"),
                          .product(name: "MLXNN", package: "mlx-swift")
                      ],
                      path: "Sources/SmokeMin"
                  )
              ]
          )
          EOF

          cat > smoke-min/Sources/SmokeMin/main.swift <<'EOF'
          import Foundation
          import MLX
          import MLXNN

          func log(_ s: String) {
              print(s)
              fflush(stdout)
          }

          log("=== SMOKE MIN START ===")

          let a = MLXArray([1.0, 2.0, 3.0])
          let b = MLXArray([10.0, 20.0, 30.0])

          log("a = \(a)")
          log("b = \(b)")
          log("a + b = \(a + b)")
          log("a * b = \(a * b)")

          let m = matmul(
              MLXArray([[1.0, 2.0], [3.0, 4.0]]),
              MLXArray([[5.0, 6.0], [7.0, 8.0]])
          )
          log("matmul = \(m)")

          let linear = Linear(inputDimensions: 2, outputDimensions: 2)
          let y = linear(MLXArray([[1.0, 2.0]]))
          log("linear = \(y)")

          eval(m, y)
          log("=== SMOKE MIN END ===")
          EOF

      - name: Build and run minimal SwiftPM smoke
        if: always()
        shell: bash
        working-directory: smoke-min
        continue-on-error: true
        run: |
          set +e
          swift package describe 2>&1 | tee "../logs/09-smoke-min-describe-${{ matrix.ref }}.log"
          swift package resolve 2>&1 | tee "../logs/09-smoke-min-resolve-${{ matrix.ref }}.log"
          swift build -v 2>&1 | tee "../logs/09-smoke-min-build-${{ matrix.ref }}.log"

          BIN="$(find .build -type f -name SmokeMin | head -n 1)"
          echo "BIN=$BIN" | tee "../logs/09-smoke-min-run-${{ matrix.ref }}.log"
          echo "=== .build metallib files ===" | tee -a "../logs/09-smoke-min-run-${{ matrix.ref }}.log"
          find .build -name '*.metallib' -print | tee -a "../logs/09-smoke-min-run-${{ matrix.ref }}.log"

          if [ -n "$BIN" ] && [ -x "$BIN" ]; then
            "$BIN" 2>&1 | tee -a "../logs/09-smoke-min-run-${{ matrix.ref }}.log"
          else
            echo "SmokeMin binary missing or not executable" | tee -a "../logs/09-smoke-min-run-${{ matrix.ref }}.log"
          fi

          exit 0

      - name: Derived data truth dump
        if: always()
        shell: bash
        run: |
          set +e
          {
            echo "=== DERIVED DATA REPRO TREE ==="
            find mlx-swift/DerivedDataRepro | sed -n '1,600p' || true
            echo

            echo "=== DERIVED DATA CURRENT TREE ==="
            find mlx-swift/DerivedDataCurrent | sed -n '1,600p' || true
            echo

            echo "=== XCRESULTS ==="
            find . -name '*.xcresult' -print
            echo

            echo "=== XCTEST BUNDLES ==="
            find . -name '*.xctest' -print
            echo

            echo "=== METALLIB FILES ==="
            find . -name '*.metallib' -print
            echo
          } | tee "logs/10-deriveddata-${{ matrix.ref }}.log"

      - name: Final per-ref summary
        if: always()
        shell: bash
        run: |
          set +e
          {
            echo "=== FINAL PER-REF SUMMARY ==="
            echo "REF=${{ matrix.ref }}"
            echo "REPRO_SCHEME=${REPRO_SCHEME:-}"
            echo "CURRENT_SCHEME=${CURRENT_SCHEME:-}"
            echo

            echo "=== AVAILABLE LOG FILES FOR THIS REF ==="
            find logs -type f -name "*${{ matrix.ref }}*" | sort
            echo

            echo "=== AVAILABLE ARTIFACT FILES FOR THIS REF ==="
            find artifacts -type f -name "*${{ matrix.ref }}*" | sort
            echo
          } | tee "logs/11-final-summary-${{ matrix.ref }}.log"

      - name: Upload per-ref artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mlx-swift-historical-probe-${{ matrix.ref }}
          if-no-files-found: warn
          path: |
            logs/**
            artifacts/**
            mlx-swift/DerivedDataRepro/**
            mlx-swift/DerivedDataCurrent/**
            smoke-min/.build/**
            smoke-min/Package.swift
            smoke-min/Sources/**
            **/*.xcresult
