name: MLX LM Smoke Tests (Ultra Verbose)

on:
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: mlx-lm-ultra-verbose-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: MLX LM ultra verbose regression on macOS
    runs-on: macos-15
    timeout-minutes: 150

    env:
      PYTHONUNBUFFERED: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      FORCE_COLOR: "1"

      HF_HOME: ${{ github.workspace }}/.hf-home
      HUGGINGFACE_HUB_CACHE: ${{ github.workspace }}/.hf-home/hub
      HF_HUB_DISABLE_TELEMETRY: "1"
      TOKENIZERS_PARALLELISM: "false"
      TRANSFORMERS_VERBOSITY: info

      PYTEST_ADDOPTS: >-
        -vvv
        -s
        --full-trace
        --tb=long
        -rA
        --durations=50
        --maxfail=1
        --showlocals
        --color=yes
        -o log_cli=true
        -o log_cli_level=DEBUG

    steps:
      - name: Check out wrapper repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Show runner details
        shell: bash
        run: |
          set -euxo pipefail
          echo "=== RUNNER ==="
          uname -a
          sw_vers
          sysctl -n machdep.cpu.brand_string || true
          xcodebuild -version || true
          python --version
          python -m pip --version
          which python
          which pip
          pwd
          ls -la
          echo "=== ENV ==="
          env | sort

      - name: Show shell capabilities
        shell: bash
        run: |
          set -euxo pipefail
          echo "BASH_VERSION=${BASH_VERSION:-unknown}"
          bash --version
          git --version
          curl --version
          unzip -v

      - name: Clone upstream MLX LM repository
        shell: bash
        run: |
          set -euxo pipefail
          git clone --depth=1 https://github.com/ml-explore/mlx-lm.git
          cd mlx-lm
          echo "=== GIT INFO ==="
          git rev-parse HEAD
          git status
          git log -1 --stat
          echo "=== TOP LEVEL ==="
          ls -la
          echo "=== FILE PREVIEW ==="
          find . -maxdepth 2 -type f | sort | sed -n '1,400p'

      - name: Upgrade packaging tools
        shell: bash
        run: |
          set -euxo pipefail
          python -m pip install --upgrade pip setuptools wheel
          python -m pip --version

      - name: Install MLX LM and test dependencies
        shell: bash
        run: |
          set -euxo pipefail
          cd mlx-lm
          python -m pip install pytest pytest-xdist pytest-timeout unittest-xml-reporting
          python -m pip install -e ".[test]"
          echo "=== INSTALLED PACKAGES ==="
          python -m pip list

      - name: Download upstream test fixtures
        shell: bash
        run: |
          set -euxo pipefail
          cd mlx-lm

          echo "=== DOWNLOADING TEST FIXTURES ==="
          curl --fail --show-error --location \
            --output test_data.zip \
            https://github.com/ml-explore/mlx-lm/releases/download/test_data/test_data.zip

          ls -lah test_data.zip
          unzip -o test_data.zip

          echo "=== POST-UNZIP TOP LEVEL ==="
          ls -lah

          echo "=== TEST FILES ==="
          find tests -type f | sort

          echo "=== HUB SNAPSHOT PREVIEW ==="
          find hub -maxdepth 3 -type f | sort | sed -n '1,300p' || true

          echo "=== DATASET PREVIEW ==="
          find datasets -maxdepth 3 -type f | sort | sed -n '1,200p' || true

      - name: Populate Hugging Face cache from bundled fixtures
        shell: bash
        run: |
          set -euxo pipefail
          cd mlx-lm

          mkdir -p "$HF_HOME"
          mkdir -p "$HUGGINGFACE_HUB_CACHE"

          if [ -d hub ]; then
            rm -rf "$HUGGINGFACE_HUB_CACHE"
            mkdir -p "$(dirname "$HUGGINGFACE_HUB_CACHE")"
            cp -R hub "$HUGGINGFACE_HUB_CACHE"
          fi

          if [ -d datasets ]; then
            cp -R datasets "$HF_HOME/" || true
          fi

          echo "=== HF CACHE ROOT ==="
          ls -lah "$HF_HOME"
          echo "=== HF HUB CACHE PREVIEW ==="
          find "$HUGGINGFACE_HUB_CACHE" -maxdepth 4 -type f | sort | sed -n '1,400p' || true

      - name: Remove huge downloaded zip after extraction
        shell: bash
        run: |
          set -euxo pipefail
          cd mlx-lm
          rm -f test_data.zip
          ls -lah

      - name: Enforce offline mode for tests
        shell: bash
        run: |
          set -euxo pipefail
          {
            echo "HF_HUB_OFFLINE=1"
            echo "TRANSFORMERS_OFFLINE=1"
            echo "HF_DATASETS_OFFLINE=1"
          } >> "$GITHUB_ENV"
          echo "Offline mode variables written to GITHUB_ENV"

      - name: Show collected tests
        shell: bash
        run: |
          set -euxo pipefail
          cd mlx-lm
          python -m pytest tests --collect-only -vv

      - name: Run extended verbose pytest subset
        shell: bash
        run: |
          set -euo pipefail
          cd mlx-lm

          echo "=== RUNNING EXTENDED VERBOSE PYTEST SUBSET ==="
          echo "This intentionally goes beyond minimal smoke coverage."
          echo "Offline mode:"
          echo "HF_HUB_OFFLINE=${HF_HUB_OFFLINE:-unset}"
          echo "TRANSFORMERS_OFFLINE=${TRANSFORMERS_OFFLINE:-unset}"
          echo "HF_DATASETS_OFFLINE=${HF_DATASETS_OFFLINE:-unset}"
          echo "Selected modules:"
          printf '%s\n' \
            tests/test_chat.py \
            tests/test_sample_utils.py \
            tests/test_tokenizers.py \
            tests/test_tool_parsing.py \
            tests/test_losses.py \
            tests/test_prompt_cache.py \
            tests/test_server.py \
            tests/test_utils.py \
            tests/test_generate.py \
            tests/test_models.py

          python -m pytest \
            tests/test_chat.py \
            tests/test_sample_utils.py \
            tests/test_tokenizers.py \
            tests/test_tool_parsing.py \
            tests/test_losses.py \
            tests/test_prompt_cache.py \
            tests/test_server.py \
            tests/test_utils.py \
            tests/test_generate.py \
            tests/test_models.py

      - name: Verify MLX LM can load and generate with Qwen2.5 0.5B
        shell: bash
        run: |
          set -euo pipefail
          cd mlx-lm

          echo "=== QWEN LOAD/GENERATE CHECK ==="
          echo "HF_HUB_OFFLINE=${HF_HUB_OFFLINE:-unset}"
          echo "TRANSFORMERS_OFFLINE=${TRANSFORMERS_OFFLINE:-unset}"
          echo "HF_DATASETS_OFFLINE=${HF_DATASETS_OFFLINE:-unset}"

          python - <<'PY'
          import os
          import sys
          import traceback

          print("=== PYTHON RUNTIME INFO ===")
          print("python:", sys.version)
          print("cwd:", os.getcwd())
          print("HF_HOME:", os.environ.get("HF_HOME"))
          print("HUGGINGFACE_HUB_CACHE:", os.environ.get("HUGGINGFACE_HUB_CACHE"))
          print("HF_HUB_OFFLINE:", os.environ.get("HF_HUB_OFFLINE"))
          print("TRANSFORMERS_OFFLINE:", os.environ.get("TRANSFORMERS_OFFLINE"))
          print("HF_DATASETS_OFFLINE:", os.environ.get("HF_DATASETS_OFFLINE"))

          from mlx_lm import load, generate

          model_id = "mlx-community/Qwen2.5-0.5B-Instruct-4bit"
          print(f"=== LOADING MODEL: {model_id} ===")

          try:
              model, tokenizer = load(model_id)
          except Exception:
              print("MODEL LOAD FAILED")
              traceback.print_exc()
              raise

          print("MODEL LOAD SUCCEEDED")
          print("model type:", type(model))
          print("tokenizer type:", type(tokenizer))

          messages = [
              {"role": "system", "content": "Be concise."},
              {"role": "user", "content": "Reply with exactly: OK"}
          ]

          prompt = tokenizer.apply_chat_template(
              messages,
              add_generation_prompt=True,
              tokenize=False,
          )

          print("=== PROMPT ===")
          print(prompt)

          try:
              output = generate(
                  model,
                  tokenizer,
                  prompt=prompt,
                  max_tokens=12,
                  verbose=True,
              )
          except Exception:
              print("GENERATION FAILED")
              traceback.print_exc()
              raise

          print("=== GENERATED TEXT BEGIN ===")
          print(output)
          print("=== GENERATED TEXT END ===")

          if not isinstance(output, str):
              raise RuntimeError(f"Expected string output, got: {type(output)}")

          if not output.strip():
              raise RuntimeError("Generation returned empty output")

          print("Qwen load/generate verification passed.")
          PY

      - name: Show Hugging Face cache state after model load
        if: always()
        shell: bash
        run: |
          set -euxo pipefail
          echo "=== HF_HOME SUMMARY ==="
          du -sh "$HF_HOME" || true
          du -sh "$HUGGINGFACE_HUB_CACHE" || true
          echo "=== HF MODEL SNAPSHOTS ==="
          find "$HUGGINGFACE_HUB_CACHE" -path '*/snapshots/*' -type f | sort | sed -n '1,200p' || true

      - name: Collect logs on failure
        if: failure()
        shell: bash
        run: |
          set -euxo pipefail
          cd mlx-lm
          echo "=== FAILURE DIAGNOSTICS ==="
          python --version
          python -m pip list
          env | sort
          python -m pytest tests --collect-only -vv || true
          find . -maxdepth 4 -type f | sort | sed -n '1,800p' || true

      - name: Upload lightweight artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mlx-lm-ultra-verbose-artifacts
          if-no-files-found: ignore
          path: |
            mlx-lm/.pytest_cache
            .hf-home
