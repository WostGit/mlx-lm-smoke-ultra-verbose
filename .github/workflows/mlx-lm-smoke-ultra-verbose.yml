name: MLX Swift Minimum Working Smoke

on:
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: mlx-swift-minimum-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  minimum-working-smoke:
    name: Proven MLX Swift smoke on macOS
    runs-on: macos-15
    timeout-minutes: 45

    env:
      DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer
      NSUnbufferedIO: "YES"
      CLICOLOR: "1"

    steps:
      - name: Check out wrapper repository
        uses: actions/checkout@v5

      - name: Show runner and toolchain info
        shell: bash
        run: |
          set -euxo pipefail
          uname -a
          sw_vers
          sysctl -n machdep.cpu.brand_string || true
          xcode-select -p
          xcodebuild -version
          swift --version
          pwd
          ls -la

      - name: Clone mlx-swift
        shell: bash
        run: |
          set -euxo pipefail
          git clone --recursive https://github.com/ml-explore/mlx-swift.git
          cd mlx-swift
          git rev-parse HEAD
          git status
          ls -la
          test -f Package.swift

      - name: Resolve package dependencies
        shell: bash
        run: |
          set -euxo pipefail
          cd mlx-swift
          swift package resolve

      - name: Build MLX Swift
        shell: bash
        run: |
          set -euxo pipefail
          cd mlx-swift
          swift build -v 2>&1 | tee swift-build.log

      - name: Run MLX Swift tests
        shell: bash
        run: |
          set -euxo pipefail
          cd mlx-swift
          xcodebuild \
            -scheme MLXSwiftPackageTests \
            -destination 'platform=macOS,arch=arm64' \
            test \
            | tee xcodebuild-tests.log

      - name: Upload minimum-working artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mlx-swift-minimum-working-artifacts
          if-no-files-found: ignore
          path: |
            mlx-swift/swift-build.log
            mlx-swift/xcodebuild-tests.log

  experimental-qwen-text-smoke:
    name: Experimental Qwen text smoke
    runs-on: macos-15
    timeout-minutes: 90
    continue-on-error: true

    env:
      DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer
      NSUnbufferedIO: "YES"
      CLICOLOR: "1"
      HF_HOME: ${{ github.workspace }}/.hf-home
      XDG_CACHE_HOME: ${{ github.workspace }}/.cache

    steps:
      - name: Check out wrapper repository
        uses: actions/checkout@v5

      - name: Prepare caches
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p "$HF_HOME" "$XDG_CACHE_HOME"

      - name: Clone mlx-swift-examples
        shell: bash
        run: |
          set -euxo pipefail
          git clone --recursive https://github.com/ml-explore/mlx-swift-examples.git
          cd mlx-swift-examples
          git rev-parse HEAD
          test -x mlx-run

      - name: Show repo help
        shell: bash
        run: |
          set -euxo pipefail
          cd mlx-swift-examples
          ./mlx-run --list || true
          ./mlx-run --debug llm-tool --help || true

      - name: Diagnostic Qwen run attempt
        shell: bash
        run: |
          set -euxo pipefail
          cd mlx-swift-examples
          ./mlx-run --debug llm-tool generate \
            --model mlx-community/Qwen2.5-0.5B-Instruct-4bit \
            --prompt "Reply with exactly OK" \
            --max-tokens 8 \
            2>&1 | tee qwen-smoke.log || true

      - name: Summarize diagnostic result
        shell: bash
        run: |
          set -euxo pipefail
          cd mlx-swift-examples
          if grep -E '(^|[^A-Z])OK([^A-Z]|$)' qwen-smoke.log >/dev/null 2>&1; then
            echo "Qwen runtime smoke succeeded."
          else
            echo "Qwen runtime smoke did not complete successfully."
            echo "This job is diagnostic-only and does not block the workflow."
          fi

      - name: Upload experimental artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mlx-swift-qwen-experimental-artifacts
          if-no-files-found: ignore
          path: |
            mlx-swift-examples/qwen-smoke.log
            .hf-home
