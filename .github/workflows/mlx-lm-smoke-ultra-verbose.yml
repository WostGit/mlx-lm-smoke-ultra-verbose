name: MLX Swift Metallib Strategy Matrix Ultra Verbose Proof

on:
  workflow_dispatch:
    inputs:
      mlx_swift_ref:
        description: "mlx-swift branch, tag, or commit to test"
        required: false
        default: "main"
  push:
  pull_request:

jobs:
  mlx-strategy-matrix:
    name: MLX strategy - ${{ matrix.strategy }}
    runs-on: macos-15
    timeout-minutes: 90

    strategy:
      fail-fast: false
      matrix:
        strategy:
          - xcodebuild-package
          - swift-smoke-no-dyld
          - swift-smoke-with-dyld
          - xcodebuild-smoke
          - deriveddata-metallib-search
          - manual-metal-compile-probe

    env:
      LOG_DIR: logs
      ARTIFACT_DIR: artifacts
      RESULT_DIR: strategy-results
      DERIVED_DATA_DIR: DerivedData
      MLX_SWIFT_DIR: mlx-swift
      SMOKE_DIR: smoke-min
      CHOSEN_SCHEME: mlx-swift-Package
      DEFAULT_MLX_SWIFT_REF: main

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare folders and inputs
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p "$LOG_DIR" "$ARTIFACT_DIR" "$RESULT_DIR" "$DERIVED_DATA_DIR"

          MLX_SWIFT_REF="${{ github.event.inputs.mlx_swift_ref }}"
          if [ -z "$MLX_SWIFT_REF" ]; then
            MLX_SWIFT_REF="$DEFAULT_MLX_SWIFT_REF"
          fi

          {
            echo "MLX_SWIFT_REF=$MLX_SWIFT_REF"
          } | tee "$ARTIFACT_DIR/resolved-inputs.env"

          {
            echo "=== PREPARE ==="
            echo "UTC_DATE=$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
            echo "STRATEGY=${{ matrix.strategy }}"
            echo "PWD=$PWD"
            echo "GITHUB_REPOSITORY=${GITHUB_REPOSITORY:-unset}"
            echo "GITHUB_SHA=${GITHUB_SHA:-unset}"
            echo "GITHUB_REF=${GITHUB_REF:-unset}"
            echo "RUNNER_OS=${RUNNER_OS:-unset}"
            echo "RUNNER_ARCH=${RUNNER_ARCH:-unset}"
            echo
            echo "=== RESOLVED INPUTS ==="
            cat "$ARTIFACT_DIR/resolved-inputs.env"
            echo
            echo "=== TOOLCHAIN ==="
            sw_vers || true
            xcodebuild -version || true
            swift --version || true
            xcrun --find metal || true
            xcrun --find metallib || true
            echo
            echo "=== DISK ==="
            df -h
          } 2>&1 | tee "$LOG_DIR/${{ matrix.strategy }}-00-prepare.log"

      - name: Clone mlx-swift
        shell: bash
        run: |
          set -euo pipefail

          source "$ARTIFACT_DIR/resolved-inputs.env"

          rm -rf "$MLX_SWIFT_DIR"

          {
            echo "=== CLONE MLX SWIFT ==="
            echo "UTC_DATE=$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
            echo "MLX_SWIFT_REF=$MLX_SWIFT_REF"
            echo "COMMAND=git clone --recursive https://github.com/ml-explore/mlx-swift.git $MLX_SWIFT_DIR"
          } 2>&1 | tee "$LOG_DIR/${{ matrix.strategy }}-01-clone-intro.log"

          git clone --recursive https://github.com/ml-explore/mlx-swift.git "$MLX_SWIFT_DIR" \
            2>&1 | tee "$LOG_DIR/${{ matrix.strategy }}-01-clone.log"

          cd "$MLX_SWIFT_DIR"

          {
            echo "=== CHECKOUT REF ==="
            git fetch --tags --force origin
            git checkout "$MLX_SWIFT_REF"
            git submodule sync --recursive
            git submodule update --init --recursive
            echo
            echo "=== MLX SWIFT VERSION ==="
            echo "MLX_SWIFT_REF=$MLX_SWIFT_REF"
            echo "MLX_SWIFT_HEAD=$(git rev-parse HEAD)"
            echo "MLX_SWIFT_DESCRIBE=$(git describe --always --dirty --tags || true)"
            echo
            echo "=== REMOTES ==="
            git remote -v
            echo
            echo "=== RECENT COMMITS ==="
            git log --oneline --decorate --graph -n 30 || true
            echo
            echo "=== SUBMODULES ==="
            git submodule status --recursive || true
            echo
            echo "=== PACKAGE ROOT ==="
            find "$PWD" -maxdepth 3 -print | sort | sed -n '1,800p'
          } 2>&1 | tee "../$LOG_DIR/${{ matrix.strategy }}-01-mlx-swift-proof.log"

          {
            echo "MLX_SWIFT_REF=$MLX_SWIFT_REF"
            echo "MLX_SWIFT_HEAD=$(git rev-parse HEAD)"
            echo "MLX_SWIFT_DESCRIBE=$(git describe --always --dirty --tags || true)"
          } | tee "../$ARTIFACT_DIR/mlx-swift-version.env"

      - name: Create smoke package
        shell: bash
        run: |
          set -euo pipefail

          rm -rf "$SMOKE_DIR"
          mkdir -p "$SMOKE_DIR/Sources/SmokeProbe"

          cat > "$SMOKE_DIR/Package.swift" <<'SWIFT'
          // swift-tools-version: 5.9
          import PackageDescription

          let package = Package(
              name: "SmokeProbe",
              platforms: [
                  .macOS(.v14)
              ],
              dependencies: [
                  .package(path: "../mlx-swift")
              ],
              targets: [
                  .executableTarget(
                      name: "SmokeProbe",
                      dependencies: [
                          .product(name: "MLX", package: "mlx-swift"),
                          .product(name: "MLXRandom", package: "mlx-swift")
                      ]
                  )
              ]
          )
          SWIFT

          cat > "$SMOKE_DIR/Sources/SmokeProbe/main.swift" <<'SWIFT'
          import Foundation
          import MLX
          import MLXRandom

          func fail(_ message: String) -> Never {
              print("MLX_SMOKE_FAILURE=\(message)")
              fflush(stdout)
              exit(1)
          }

          func proof(_ key: String, _ value: Any) {
              print("\(key)=\(value)")
          }

          proof("MLX_SMOKE_BEGIN", "YES")

          let a = MLXArray([Float(1), Float(2), Float(3)])
          let b = MLXArray([Float(10), Float(20), Float(30)])
          let c = a + b
          eval(c)

          let cValues = c.asArray(Float.self)
          proof("MLX_SMOKE_RESULT", cValues)

          if cValues != [Float(11), Float(22), Float(33)] {
              fail("vector mismatch expected [11, 22, 33], got \(cValues)")
          }

          let x = MLXArray(Array(repeating: Float(1), count: 1024), [32, 32])
          let y = matmul(x, x)
          eval(y)

          let yValues = y.asArray(Float.self)
          proof("MLX_MATMUL_FIRST", yValues[0])
          proof("MLX_MATMUL_COUNT", yValues.count)

          if yValues.count != 1024 {
              fail("matmul count mismatch expected 1024 got \(yValues.count)")
          }

          if abs(yValues[0] - Float(32)) > Float(0.0001) {
              fail("matmul first mismatch expected 32.0 got \(yValues[0])")
          }

          proof("MLX_SMOKE_RESULT_OK", "YES")
          proof("MLX_MATMUL_RESULT_OK", "YES")
          proof("MLX_SMOKE_END", "YES")
          SWIFT

          {
            echo "=== SMOKE PACKAGE CREATED ==="
            find "$SMOKE_DIR" -maxdepth 6 -type f -print | sort
            echo
            echo "=== Package.swift ==="
            cat "$SMOKE_DIR/Package.swift"
            echo
            echo "=== main.swift ==="
            cat "$SMOKE_DIR/Sources/SmokeProbe/main.swift"
          } 2>&1 | tee "$LOG_DIR/${{ matrix.strategy }}-02-smoke-created.log"

      - name: Run selected strategy
        shell: bash
        run: |
          set -uo pipefail

          STRATEGY="${{ matrix.strategy }}"
          RESULT_FILE="$RESULT_DIR/$STRATEGY.env"
          LOG_FILE="$LOG_DIR/$STRATEGY.log"

          count_metallibs() {
            find "$PWD" "$HOME/Library/Developer/Xcode/DerivedData" \
              -name '*.metallib' \
              -type f \
              2>/dev/null \
              | sort -u \
              | wc -l \
              | tr -d ' '
          }

          count_cmlx_bundles() {
            find "$PWD" "$HOME/Library/Developer/Xcode/DerivedData" \
              -name 'mlx-swift_Cmlx.bundle' \
              -type d \
              2>/dev/null \
              | sort -u \
              | wc -l \
              | tr -d ' '
          }

          write_result() {
            local result="$1"
            local hint="$2"
            local exit_code="$3"

            METALLIB_COUNT="$(count_metallibs)"
            CMLX_BUNDLE_COUNT="$(count_cmlx_bundles)"

            {
              echo "STRATEGY=$STRATEGY"
              echo "RESULT=$result"
              echo "EXIT_CODE=$exit_code"
              echo "METALLIB_COUNT=$METALLIB_COUNT"
              echo "CMLX_BUNDLE_COUNT=$CMLX_BUNDLE_COUNT"
              echo "ERROR_HINT=$hint"
              echo "LOG_FILE=$LOG_FILE"
            } | tee "$RESULT_FILE"
          }

          {
            echo "=== STRATEGY START ==="
            echo "UTC_DATE=$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
            echo "STRATEGY=$STRATEGY"
            echo "PWD=$PWD"
            echo
            echo "=== TOOLCHAIN SNAPSHOT ==="
            sw_vers || true
            xcodebuild -version || true
            swift --version || true
            xcrun --find metal || true
            xcrun --find metallib || true
            echo
            echo "=== PRE-STRATEGY METALLIBS ==="
            find "$PWD" "$HOME/Library/Developer/Xcode/DerivedData" \
              -name '*.metallib' \
              -type f \
              -print \
              -exec ls -lh {} \; \
              2>/dev/null || true
            echo
            echo "=== PRE-STRATEGY CMLX BUNDLES ==="
            find "$PWD" "$HOME/Library/Developer/Xcode/DerivedData" \
              -name 'mlx-swift_Cmlx.bundle' \
              -type d \
              -print \
              -exec find {} -maxdepth 5 -print \; \
              2>/dev/null || true
            echo

            case "$STRATEGY" in
              xcodebuild-package)
                cd "$MLX_SWIFT_DIR"

                echo "=== SWIFT PACKAGE DIAGNOSTICS ==="
                swift package tools-version || true
                swift package resolve -v
                swift package describe || true
                swift package show-dependencies || true

                echo
                echo "=== XCODEBUILD LIST ==="
                xcodebuild -list
                xcodebuild -list -json || true

                echo
                echo "=== XCODEBUILD TEST ==="
                xcodebuild test \
                  -scheme "$CHOSEN_SCHEME" \
                  -destination 'platform=macOS' \
                  -derivedDataPath "../$DERIVED_DATA_DIR"
                ;;

              swift-smoke-no-dyld)
                cd "$SMOKE_DIR"

                echo "=== SWIFT RESOLVE ==="
                swift package resolve -v

                echo
                echo "=== SWIFT BUILD ==="
                swift build -v

                echo
                echo "=== SWIFT BIN PATH ==="
                swift build --show-bin-path || true

                echo
                echo "=== SWIFT RUN WITHOUT DYLD_FRAMEWORK_PATH ==="
                swift run SmokeProbe
                ;;

              swift-smoke-with-dyld)
                cd "$SMOKE_DIR"

                echo "=== SWIFT RESOLVE ==="
                swift package resolve -v

                echo
                echo "=== SWIFT BUILD ==="
                swift build -v

                BIN_PATH="$(swift build --show-bin-path)"
                export DYLD_FRAMEWORK_PATH="$BIN_PATH:${DYLD_FRAMEWORK_PATH:-}"

                echo
                echo "=== DYLD SETUP ==="
                echo "BIN_PATH=$BIN_PATH"
                echo "DYLD_FRAMEWORK_PATH=$DYLD_FRAMEWORK_PATH"

                echo
                echo "=== BIN PATH TREE ==="
                find "$BIN_PATH" -maxdepth 6 -print | sort || true

                echo
                echo "=== CMLX BUNDLES NEAR BIN PATH ==="
                find "$BIN_PATH" -name 'mlx-swift_Cmlx.bundle' -type d -print -exec find {} -maxdepth 5 -print \; || true

                echo
                echo "=== METALLIBS NEAR BIN PATH ==="
                find "$BIN_PATH" -name '*.metallib' -type f -print -exec ls -lh {} \; -exec shasum -a 256 {} \; || true

                echo
                echo "=== SWIFT RUN WITH DYLD_FRAMEWORK_PATH ==="
                swift run SmokeProbe
                ;;

              xcodebuild-smoke)
                cd "$SMOKE_DIR"

                echo "=== SWIFT RESOLVE ==="
                swift package resolve -v

                echo
                echo "=== XCODEBUILD LIST SMOKE PACKAGE ==="
                xcodebuild -list || true
                xcodebuild -list -json || true

                echo
                echo "=== XCODEBUILD BUILD SMOKE ==="
                xcodebuild build \
                  -scheme SmokeProbe \
                  -destination 'platform=macOS' \
                  -derivedDataPath "../$DERIVED_DATA_DIR"

                echo
                echo "=== FIND SMOKE BINARY ==="
                BIN="$(
                  find "../$DERIVED_DATA_DIR" \
                    -type f \
                    -perm +111 \
                    -name SmokeProbe \
                    | head -1
                )"

                if [ -z "$BIN" ]; then
                  echo "ERROR: SmokeProbe binary not found in DerivedData"
                  exit 1
                fi

                echo "SMOKE_BINARY=$BIN"

                BIN_DIR="$(dirname "$BIN")"
                export DYLD_FRAMEWORK_PATH="$BIN_DIR:${DYLD_FRAMEWORK_PATH:-}"

                echo "BIN_DIR=$BIN_DIR"
                echo "DYLD_FRAMEWORK_PATH=$DYLD_FRAMEWORK_PATH"

                echo
                echo "=== BIN DIR TREE ==="
                find "$BIN_DIR" -maxdepth 6 -print | sort || true

                echo
                echo "=== RUN SMOKE BINARY ==="
                "$BIN"
                ;;

              deriveddata-metallib-search)
                cd "$MLX_SWIFT_DIR"

                echo "=== XCODEBUILD BUILD PACKAGE ==="
                xcodebuild build \
                  -scheme "$CHOSEN_SCHEME" \
                  -destination 'platform=macOS' \
                  -derivedDataPath "../$DERIVED_DATA_DIR"

                echo
                echo "=== ALL METALLIBS ==="
                find ".." "$HOME/Library/Developer/Xcode/DerivedData" \
                  -name '*.metallib' \
                  -type f \
                  -print \
                  -exec ls -lh {} \; \
                  -exec shasum -a 256 {} \; \
                  2>/dev/null || true

                echo
                echo "=== ALL DEFAULT.METALLIBS ==="
                find ".." "$HOME/Library/Developer/Xcode/DerivedData" \
                  -name 'default.metallib' \
                  -type f \
                  -print \
                  -exec ls -lh {} \; \
                  -exec shasum -a 256 {} \; \
                  2>/dev/null || true

                echo
                echo "=== ALL CMLX BUNDLES ==="
                find ".." "$HOME/Library/Developer/Xcode/DerivedData" \
                  -name 'mlx-swift_Cmlx.bundle' \
                  -type d \
                  -print \
                  -exec find {} -maxdepth 5 -print \; \
                  2>/dev/null || true

                METALLIB_COUNT_AFTER="$(count_metallibs)"
                if [ "$METALLIB_COUNT_AFTER" -lt 1 ]; then
                  echo "ERROR: build completed but no .metallib found in workspace or Xcode DerivedData"
                  exit 1
                fi
                ;;

              manual-metal-compile-probe)
                METAL_FILE="$MLX_SWIFT_DIR/Source/Cmlx/mlx-generated/metal/rms_norm.metal"
                OUT_DIR="$ARTIFACT_DIR/manual-metal-probe"
                mkdir -p "$OUT_DIR"

                echo "=== MANUAL METAL COMPILE PROBE ==="
                echo "METAL_FILE=$METAL_FILE"
                echo "OUT_DIR=$OUT_DIR"

                if [ ! -f "$METAL_FILE" ]; then
                  echo "ERROR: probe metal file missing: $METAL_FILE"
                  exit 1
                fi

                xcrun -sdk macosx metal -c "$METAL_FILE" -o "$OUT_DIR/rms_norm.air"
                xcrun -sdk macosx metallib "$OUT_DIR/rms_norm.air" -o "$OUT_DIR/rms_norm.metallib"

                echo
                echo "=== MANUAL METAL OUTPUTS ==="
                find "$OUT_DIR" -maxdepth 2 -type f -print -exec ls -lh {} \; -exec shasum -a 256 {} \;
                ;;

              *)
                echo "ERROR: unknown strategy $STRATEGY"
                exit 1
                ;;
            esac

            echo
            echo "=== POST-STRATEGY METALLIBS ==="
            find "$PWD" "$HOME/Library/Developer/Xcode/DerivedData" \
              -name '*.metallib' \
              -type f \
              -print \
              -exec ls -lh {} \; \
              -exec shasum -a 256 {} \; \
              2>/dev/null || true

            echo
            echo "=== POST-STRATEGY CMLX BUNDLES ==="
            find "$PWD" "$HOME/Library/Developer/Xcode/DerivedData" \
              -name 'mlx-swift_Cmlx.bundle' \
              -type d \
              -print \
              -exec find {} -maxdepth 5 -print \; \
              2>/dev/null || true

            echo
            echo "=== STRATEGY FINISHED SUCCESSFULLY ==="
          } 2>&1 | tee "$LOG_FILE"

          EXIT_CODE="${PIPESTATUS[0]}"

          if [ "$EXIT_CODE" -eq 0 ]; then
            write_result "PASS" "none" "$EXIT_CODE"
          else
            HINT="$(
              grep -Eio \
                'default.metallib|mlx-swift_Cmlx.bundle|library not loaded|no such file|failed to load|error:.*|fatal error:.*|metal.*failed|metallib.*failed|missing|not found|Segmentation fault|Traceback|swift-runtime' \
                "$LOG_FILE" \
                | tail -1 \
                | tr '\n' ' ' \
                | sed 's/[[:space:]]\+/ /g'
            )"

            if [ -z "$HINT" ]; then
              HINT="see log"
            fi

            write_result "FAIL" "$HINT" "$EXIT_CODE"
          fi

          # Keep the matrix green so the final summarizer always runs and gives diagnosis.
          exit 0

      - name: Generate per-strategy checksum
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          CHECKSUM_FILE="$ARTIFACT_DIR/checksums-${{ matrix.strategy }}.sha256"

          {
            echo "=== CHECKSUMS FOR ${{ matrix.strategy }} ==="
            echo "UTC_DATE=$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
            echo
            find "$LOG_DIR" "$ARTIFACT_DIR" "$RESULT_DIR" \
              -type f \
              ! -name "$(basename "$CHECKSUM_FILE")" \
              -print0 \
              | sort -z \
              | xargs -0 shasum -a 256
          } | tee "$CHECKSUM_FILE"

      - name: Upload strategy artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: strategy-${{ matrix.strategy }}
          path: |
            logs/
            artifacts/
            strategy-results/
            DerivedData/

  summarize-mlx-strategies:
    name: Summarize all MLX strategy results
    runs-on: macos-15
    needs:
      - mlx-strategy-matrix
    if: always()

    steps:
      - name: Download all strategy artifacts
        uses: actions/download-artifact@v4
        with:
          path: downloaded-artifacts

      - name: Print one-block final summary
        shell: bash
        run: |
          set -euo pipefail

          SUMMARY_FILE="mlx-strategy-summary.txt"

          {
            echo "================ MLX STRATEGY SUMMARY ================"
            echo "UTC_DATE=$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
            echo

            printf '%-34s %-8s %-9s %-12s %-13s %s\n' \
              "STRATEGY" "RESULT" "EXIT" "METALLIBS" "CMLX_BUNDLES" "ERROR_HINT"

            printf '%-34s %-8s %-9s %-12s %-13s %s\n' \
              "--------" "------" "----" "---------" "------------" "----------"

            PASS_COUNT=0
            FAIL_COUNT=0
            TOTAL_COUNT=0

            RESULT_FILES="$(find downloaded-artifacts -path '*/strategy-results/*.env' -type f | sort || true)"

            if [ -z "$RESULT_FILES" ]; then
              echo "NO_RESULT_FILES_FOUND"
            fi

            while IFS= read -r file; do
              if [ -z "$file" ]; then
                continue
              fi

              STRATEGY="$(grep '^STRATEGY=' "$file" | cut -d= -f2- || true)"
              RESULT="$(grep '^RESULT=' "$file" | cut -d= -f2- || true)"
              EXIT_CODE="$(grep '^EXIT_CODE=' "$file" | cut -d= -f2- || true)"
              METALLIB_COUNT="$(grep '^METALLIB_COUNT=' "$file" | cut -d= -f2- || true)"
              CMLX_BUNDLE_COUNT="$(grep '^CMLX_BUNDLE_COUNT=' "$file" | cut -d= -f2- || true)"
              ERROR_HINT="$(grep '^ERROR_HINT=' "$file" | cut -d= -f2- || true)"

              if [ -z "$STRATEGY" ]; then STRATEGY="unknown"; fi
              if [ -z "$RESULT" ]; then RESULT="UNKNOWN"; fi
              if [ -z "$EXIT_CODE" ]; then EXIT_CODE="unknown"; fi
              if [ -z "$METALLIB_COUNT" ]; then METALLIB_COUNT="unknown"; fi
              if [ -z "$CMLX_BUNDLE_COUNT" ]; then CMLX_BUNDLE_COUNT="unknown"; fi
              if [ -z "$ERROR_HINT" ]; then ERROR_HINT="none"; fi

              printf '%-34s %-8s %-9s %-12s %-13s %s\n' \
                "$STRATEGY" "$RESULT" "$EXIT_CODE" "$METALLIB_COUNT" "$CMLX_BUNDLE_COUNT" "$ERROR_HINT"

              TOTAL_COUNT=$((TOTAL_COUNT + 1))

              if [ "$RESULT" = "PASS" ]; then
                PASS_COUNT=$((PASS_COUNT + 1))
              elif [ "$RESULT" = "FAIL" ]; then
                FAIL_COUNT=$((FAIL_COUNT + 1))
              fi
            done <<< "$RESULT_FILES"

            echo
            echo "TOTAL_STRATEGIES=$TOTAL_COUNT"
            echo "PASS_COUNT=$PASS_COUNT"
            echo "FAIL_COUNT=$FAIL_COUNT"
            echo

            get_strategy_result() {
              local wanted="$1"
              local file
              file="$(grep -R -l "^STRATEGY=$wanted$" downloaded-artifacts/*/strategy-results/*.env 2>/dev/null | head -1 || true)"
              if [ -z "$file" ]; then
                echo "MISSING"
                return
              fi
              grep '^RESULT=' "$file" | cut -d= -f2- || echo "UNKNOWN"
            }

            XCODEBUILD_PACKAGE_RESULT="$(get_strategy_result xcodebuild-package)"
            SWIFT_NO_DYLD_RESULT="$(get_strategy_result swift-smoke-no-dyld)"
            SWIFT_WITH_DYLD_RESULT="$(get_strategy_result swift-smoke-with-dyld)"
            XCODEBUILD_SMOKE_RESULT="$(get_strategy_result xcodebuild-smoke)"
            DERIVEDDATA_SEARCH_RESULT="$(get_strategy_result deriveddata-metallib-search)"
            MANUAL_METAL_RESULT="$(get_strategy_result manual-metal-compile-probe)"

            echo "=== INTERPRETATION ==="

            if [ "$PASS_COUNT" -gt 0 ]; then
              echo "AT_LEAST_ONE_STRATEGY_WORKED=YES"
            else
              echo "AT_LEAST_ONE_STRATEGY_WORKED=NO"
            fi

            echo "XCODEBUILD_PACKAGE_RESULT=$XCODEBUILD_PACKAGE_RESULT"
            echo "SWIFT_SMOKE_NO_DYLD_RESULT=$SWIFT_NO_DYLD_RESULT"
            echo "SWIFT_SMOKE_WITH_DYLD_RESULT=$SWIFT_WITH_DYLD_RESULT"
            echo "XCODEBUILD_SMOKE_RESULT=$XCODEBUILD_SMOKE_RESULT"
            echo "DERIVEDDATA_METALLIB_SEARCH_RESULT=$DERIVEDDATA_SEARCH_RESULT"
            echo "MANUAL_METAL_COMPILE_PROBE_RESULT=$MANUAL_METAL_RESULT"
            echo

            echo "=== DIAGNOSIS ==="

            if [ "$SWIFT_NO_DYLD_RESULT" = "PASS" ]; then
              echo "DIAGNOSIS=Plain SwiftPM smoke works. MLX runtime assets are discoverable without extra environment setup."
            elif [ "$SWIFT_WITH_DYLD_RESULT" = "PASS" ]; then
              echo "DIAGNOSIS=SwiftPM smoke works only with DYLD_FRAMEWORK_PATH. Runtime bundle/search-path packaging is the likely issue."
            elif [ "$XCODEBUILD_SMOKE_RESULT" = "PASS" ]; then
              echo "DIAGNOSIS=Xcode-built smoke works, but SwiftPM smoke does not. Xcode is packaging or locating MLX runtime assets better than SwiftPM."
            elif [ "$XCODEBUILD_PACKAGE_RESULT" = "PASS" ]; then
              echo "DIAGNOSIS=Upstream MLX package tests pass, but external smoke integration fails. Focus on package integration, bundle lookup, or runtime path."
            elif [ "$DERIVEDDATA_SEARCH_RESULT" = "PASS" ]; then
              echo "DIAGNOSIS=Metallib exists after Xcode build, but smoke routes fail. Focus on runtime bundle lookup rather than shader compilation."
            elif [ "$MANUAL_METAL_RESULT" = "PASS" ]; then
              echo "DIAGNOSIS=The Metal compiler works, but MLX build/package integration failed. Focus on default.metallib generation and Cmlx resource bundling."
            else
              echo "DIAGNOSIS=No strategy passed. This points to toolchain incompatibility, upstream MLX Swift breakage, missing generated shaders, or macOS runner issues."
            fi

            echo
            echo "=== RECOMMENDED NEXT STEP ==="

            if [ "$SWIFT_NO_DYLD_RESULT" = "PASS" ]; then
              echo "Use the plain SwiftPM smoke test as the minimal reliable CI proof."
            elif [ "$SWIFT_WITH_DYLD_RESULT" = "PASS" ]; then
              echo "Use SwiftPM smoke with DYLD_FRAMEWORK_PATH set to swift build --show-bin-path."
            elif [ "$XCODEBUILD_SMOKE_RESULT" = "PASS" ]; then
              echo "Use xcodebuild for the smoke executable. Do not rely on swift run for MLX runtime asset packaging."
            elif [ "$XCODEBUILD_PACKAGE_RESULT" = "PASS" ]; then
              echo "Keep xcodebuild package tests as the core proof, then debug why external package integration cannot locate MLX runtime assets."
            elif [ "$MANUAL_METAL_RESULT" = "PASS" ]; then
              echo "Metal itself is available. Investigate MLX Swift's MetalCompilerPlugin/default.metallib resource generation."
            else
              echo "Inspect strategy logs. Start with xcodebuild-package.log and manual-metal-compile-probe.log."
            fi

            echo
            echo "=== RESULT FILES ==="
            find downloaded-artifacts -path '*/strategy-results/*.env' -type f | sort || true
            echo
            echo "=== LOG FILES ==="
            find downloaded-artifacts -path '*/logs/*.log' -type f | sort || true
            echo "======================================================"
          } | tee "$SUMMARY_FILE"

      - name: Upload final summary
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mlx-strategy-final-summary
          path: mlx-strategy-summary.txt
