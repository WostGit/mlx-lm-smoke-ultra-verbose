name: MLX Swift Minimum Working Smoke

on:
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: mlx-swift-minimum-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core-smoke:
    name: MLX Swift minimum working smoke on macOS
    runs-on: macos-15
    timeout-minutes: 60

    env:
      DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer
      NSUnbufferedIO: "YES"
      CLICOLOR: "1"

    steps:
      - name: Check out wrapper repository
        uses: actions/checkout@v5

      - name: Show runner and toolchain info
        shell: bash
        run: |
          set -euxo pipefail
          uname -a
          sw_vers
          sysctl -n machdep.cpu.brand_string || true
          xcode-select -p
          xcodebuild -version
          swift --version
          pwd
          ls -la

      - name: Clone mlx-swift with submodules
        shell: bash
        run: |
          set -euxo pipefail
          git clone --recursive https://github.com/ml-explore/mlx-swift.git
          cd mlx-swift
          git rev-parse HEAD
          git status
          git log -1 --stat
          git submodule status

      - name: Verify vendored MLX sources exist
        shell: bash
        run: |
          set -euxo pipefail
          cd mlx-swift
          test -f Package.swift
          test -d Source/Cmlx/mlx
          test -d Source/Cmlx/mlx-c
          test -f Source/Cmlx/mlx/mlx/backend/cpu/compiled.cpp

      - name: Show available schemes
        shell: bash
        run: |
          set -euxo pipefail
          cd mlx-swift
          xcodebuild -list

      - name: Run upstream package tests with xcodebuild
        shell: bash
        run: |
          set -euxo pipefail
          cd mlx-swift
          xcodebuild \
            test \
            -scheme mlx-swift-Package \
            -destination 'platform=macOS' \
            -derivedDataPath "$PWD/DerivedData" \
            -resultBundlePath "$PWD/MLXSwiftPackageTests.xcresult" \
            -showBuildTimingSummary

      - name: Upload core artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mlx-swift-minimum-working-artifacts
          if-no-files-found: ignore
          path: |
            mlx-swift/MLXSwiftPackageTests.xcresult

  experimental-qwen:
    name: Experimental Qwen text smoke
    runs-on: macos-15
    timeout-minutes: 45
    needs: core-smoke
    continue-on-error: true

    env:
      DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer
      NSUnbufferedIO: "YES"
      CLICOLOR: "1"

    steps:
      - name: Check out wrapper repository
        uses: actions/checkout@v5

      - name: Show runner and toolchain info
        shell: bash
        run: |
          set -euxo pipefail
          uname -a
          sw_vers
          xcode-select -p
          xcodebuild -version
          swift --version
          pwd
          ls -la

      - name: Create experimental Qwen smoke package
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p smoke-qwen
          cd smoke-qwen

          cat > Package.swift <<'SWIFT'
          // swift-tools-version: 6.1
          import PackageDescription

          let package = Package(
              name: "SmokeQwen",
              platforms: [.macOS(.v14)],
              dependencies: [
                  .package(url: "https://github.com/ml-explore/mlx-swift-lm", .upToNextMajor(from: "3.31.3")),
                  .package(url: "https://github.com/huggingface/swift-huggingface", from: "0.9.0"),
                  .package(url: "https://github.com/huggingface/swift-transformers", from: "1.3.0")
              ],
              targets: [
                  .executableTarget(
                      name: "SmokeQwen",
                      dependencies: [
                          .product(name: "MLXLLM", package: "mlx-swift-lm"),
                          .product(name: "MLXLMCommon", package: "mlx-swift-lm"),
                          .product(name: "MLXHuggingFace", package: "mlx-swift-lm"),
                          .product(name: "HuggingFace", package: "swift-huggingface"),
                          .product(name: "Tokenizers", package: "swift-transformers")
                      ]
                  )
              ]
          )
          SWIFT

          mkdir -p Sources/SmokeQwen
          cat > Sources/SmokeQwen/main.swift <<'SWIFT'
          import Foundation
          import HuggingFace
          import Tokenizers
          import MLXLLM
          import MLXLMCommon
          import MLXHuggingFace

          @main
          struct SmokeQwen {
              static func main() async throws {
                  print("Starting experimental Qwen text-only smoke test.")
                  print("About to load mlx-community/Qwen2.5-0.5B-Instruct-4bit")

                  let model = try await loadModel(
                      from: #hubDownloader(),
                      using: #huggingFaceTokenizerLoader(),
                      id: "mlx-community/Qwen2.5-0.5B-Instruct-4bit"
                  )

                  let session = ChatSession(model)
                  let response = try await session.respond(to: "Reply with exactly OK")

                  print("=== RESPONSE BEGIN ===")
                  print(response)
                  print("=== RESPONSE END ===")
                  print("Experimental Qwen smoke test passed.")
              }
          }
          SWIFT

      - name: Resolve package
        shell: bash
        run: |
          set -euxo pipefail
          cd smoke-qwen
          swift package resolve

      - name: Build with SwiftPM
        shell: bash
        run: |
          set -euxo pipefail
          cd smoke-qwen
          swift build -v

      - name: Inspect metallib and bundle candidates
        shell: bash
        run: |
          set -euxo pipefail
          cd smoke-qwen
          echo "=== BUILD TREE ==="
          find .build -maxdepth 5 | sort | sed -n '1,400p' || true
          echo "=== METALLIB CANDIDATES ==="
          find .build -name '*.metallib' | sort || true
          echo "=== Cmlx CANDIDATES ==="
          find .build -iname '*cmlx*' | sort || true
          echo "=== SYSTEM DEFAULT.METALLIB CANDIDATES ==="
          find /System/Library /usr/lib -name default.metallib 2>/dev/null | sort | sed -n '1,50p' || true

      - name: Prepare metallib fallback
        shell: bash
        run: |
          set -euxo pipefail
          cd smoke-qwen

          BIN_DIR="$(cd .build/arm64-apple-macosx/debug && pwd)"
          BINARY="$BIN_DIR/SmokeQwen"
          test -x "$BINARY"

          METALLIB_PATH="$(find "$BIN_DIR" -name default.metallib | head -n 1 || true)"
          if [ -z "${METALLIB_PATH:-}" ]; then
            METALLIB_PATH="$(find "$PWD/.build" -name default.metallib | head -n 1 || true)"
          fi

          if [ -z "${METALLIB_PATH:-}" ]; then
            SYS_METALLIB="$(find /System/Library /usr/lib -name default.metallib 2>/dev/null | head -n 1 || true)"
            if [ -n "${SYS_METALLIB:-}" ]; then
              cp "$SYS_METALLIB" "$BIN_DIR/default.metallib"
              METALLIB_PATH="$BIN_DIR/default.metallib"
            fi
          fi

          echo "BIN_DIR=$BIN_DIR"
          echo "BINARY=$BINARY"
          echo "METALLIB_PATH=${METALLIB_PATH:-<none>}"

          if [ -n "${METALLIB_PATH:-}" ]; then
            ls -lah "$METALLIB_PATH"
          fi

          {
            echo "BIN_DIR=$BIN_DIR"
            echo "BINARY=$BINARY"
            echo "METALLIB_PATH=${METALLIB_PATH:-}"
          } > smoke-env.txt

      - name: Run experimental Qwen smoke
        shell: bash
        run: |
          set -euxo pipefail
          cd smoke-qwen
          . ./smoke-env.txt

          cd "$BIN_DIR"
          pwd
          ls -lah
          find . -maxdepth 4 | sort | sed -n '1,300p'

          if [ -n "${METALLIB_PATH:-}" ]; then
            export METAL_PATH="$METALLIB_PATH"
          fi

          "$BINARY"

      - name: Upload experimental artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mlx-swift-qwen-experimental-artifacts
          if-no-files-found: ignore
          path: |
            smoke-qwen/.build
            smoke-qwen/smoke-env.txt
