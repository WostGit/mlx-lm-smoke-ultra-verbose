name: MLX Swift Self Contained Test

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
  pull_request:

permissions:
  contents: read

concurrency:
  group: mlx-swift-self-contained-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-mlx-swift:
    name: Test mlx-swift on macOS
    runs-on: macos-15
    timeout-minutes: 60

    env:
      DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer
      NSUnbufferedIO: "YES"
      CLICOLOR: "1"
      FORCE_COLOR: "1"

    steps:
      - name: Checkout wrapper repo
        uses: actions/checkout@v5

      - name: Show host details
        shell: bash
        run: |
          set -euxo pipefail
          uname -a
          sw_vers
          xcode-select -p
          xcodebuild -version
          swift --version
          sysctl -n machdep.cpu.brand_string || true

      - name: Fresh clone mlx-swift
        shell: bash
        run: |
          set -euxo pipefail
          rm -rf mlx-swift
          git clone https://github.com/ml-explore/mlx-swift.git
          cd mlx-swift
          git rev-parse HEAD
          git submodule update --init --recursive
          git status
          ls -la
          find . -maxdepth 2 -type f | sort | sed -n '1,250p'

      - name: Show available Xcode schemes
        shell: bash
        run: |
          set -euxo pipefail
          cd mlx-swift
          xcodebuild -list | tee xcodebuild-list.log

      - name: Run mlx-swift package tests
        shell: bash
        run: |
          set -euxo pipefail
          cd mlx-swift
          xcodebuild \
            test \
            -scheme mlx-swift-Package \
            -destination 'platform=macOS,arch=arm64' \
            -derivedDataPath DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            | tee xcodebuild-tests.log

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mlx-swift-self-contained-logs
          if-no-files-found: ignore
          path: |
            mlx-swift/xcodebuild-list.log
            mlx-swift/xcodebuild-tests.log
            mlx-swift/DerivedData/Logs/Test/*.xcresult
