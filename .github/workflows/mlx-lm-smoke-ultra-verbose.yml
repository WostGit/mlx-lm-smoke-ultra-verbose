name: MLX Swift Failure-Tolerant Ultra Verbose Smoke

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  mlx-swift-ultra-verbose:
    name: MLX Swift failure-tolerant smoke on macOS
    runs-on: macos-15
    timeout-minutes: 90

    env:
      NSUnbufferedIO: "YES"
      PYTHONUNBUFFERED: "1"
      FORCE_COLOR: "1"
      CI: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Section 0 - toolchain and machine info
        run: |
          set +e
          echo "=== PWD ==="
          pwd
          echo

          echo "=== DATE ==="
          date -u
          echo

          echo "=== SW_VERS ==="
          sw_vers
          echo

          echo "=== UNAME ==="
          uname -a
          echo

          echo "=== XCODE SELECT ==="
          xcode-select -p
          echo

          echo "=== XCODEBUILD VERSION ==="
          xcodebuild -version
          echo

          echo "=== SWIFT VERSION ==="
          swift --version
          echo

          echo "=== CLANG VERSION ==="
          clang --version
          echo

          echo "=== XCRUN SDK PATH ==="
          xcrun --show-sdk-path
          echo

          echo "=== AVAILABLE SDKS ==="
          xcodebuild -showsdks
          echo

          echo "=== ENV SORTED ==="
          env | sort
          echo

      - name: Section 1 - repository tree
        run: |
          set +e
          echo "=== TOP LEVEL ==="
          ls -la
          echo

          echo "=== REPO TREE (TOP 300 PATHS) ==="
          find . | sed -n '1,300p'
          echo

          echo "=== GIT STATUS ==="
          git status --short --branch
          echo

          echo "=== GIT SUBMODULE STATUS ==="
          git submodule status --recursive || true
          echo

      - name: Section 2 - critical path assertions
        run: |
          set +e
          echo "=== ASSERTING IMPORTANT PATHS ==="

          for p in \
            "." \
            "./mlx-swift" \
            "./mlx-swift/Package.swift" \
            "./mlx-swift/Source" \
            "./mlx-swift/Source/Cmlx" \
            "./mlx-swift/Tests"
          do
            if [ -e "$p" ]; then
              echo "FOUND: $p"
            else
              echo "MISSING: $p"
            fi
          done

          echo
          echo "=== Cmlx AREA ==="
          find ./mlx-swift/Source/Cmlx -maxdepth 4 2>/dev/null | sed -n '1,400p'
          echo

          echo "=== LOOK FOR compiled_conditional.cpp ==="
          find ./mlx-swift -name 'compiled_conditional.cpp' -print
          echo

          echo "=== LOOK FOR compiled.cpp ==="
          find ./mlx-swift -name 'compiled.cpp' -print
          echo

          echo "=== LOOK FOR default.metallib ==="
          find ./mlx-swift -name 'default.metallib' -print
          echo

          echo "=== LOOK FOR GENERATED CPP ==="
          find ./mlx-swift -path '*mlx-generated*' -type f | sed -n '1,300p'
          echo

      - name: Section 3 - package metadata discovery
        working-directory: mlx-swift
        run: |
          set +e
          echo "=== swift package describe ==="
          swift package describe 2>&1 | tee ../swift-package-describe.log
          echo

          echo "=== swift package dump-package ==="
          swift package dump-package 2>&1 | tee ../swift-package-dump-package.log
          echo

          echo "=== swift package tools-version ==="
          swift package tools-version 2>&1 | tee ../swift-package-tools-version.log
          echo

      - name: Section 4 - xcode scheme discovery
        working-directory: mlx-swift
        run: |
          set +e
          echo "=== xcodebuild -list ==="
          xcodebuild -list 2>&1 | tee ../xcodebuild-list.log
          echo

          echo "=== xcodebuild -list -json ==="
          xcodebuild -list -json 2>&1 | tee ../xcodebuild-list-json.log
          echo

      - name: Section 5 - swift build diagnostic
        working-directory: mlx-swift
        continue-on-error: true
        run: |
          set +e
          echo "=== swift build -v ==="
          swift build -v 2>&1 | tee ../swift-build-v.log
          status=${PIPESTATUS[0]}
          echo "swift build exit status: $status"
          exit 0

      - name: Section 6 - proven xcode package build
        id: proven_build
        working-directory: mlx-swift
        run: |
          set -o pipefail
          rm -rf DerivedData

          echo "=== BUILDING PROVEN PACKAGE LAYER ==="
          echo "Using package-generated Xcode scheme because this is the most reliable layer."
          echo

          xcodebuild \
            -scheme mlx-swift-Package \
            -destination 'platform=macOS,arch=arm64' \
            -derivedDataPath DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            build 2>&1 | tee ../xcodebuild-proven-build.log

      - name: Section 7 - proven xcode package tests
        id: proven_test
        working-directory: mlx-swift
        run: |
          set -o pipefail
          echo "=== TESTING PROVEN PACKAGE LAYER ==="
          xcodebuild \
            -scheme mlx-swift-Package \
            -destination 'platform=macOS,arch=arm64' \
            -derivedDataPath DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            test 2>&1 | tee ../xcodebuild-proven-test.log

      - name: Section 8 - derived data and artifact scan
        if: always()
        run: |
          set +e
          echo "=== DERIVED DATA TREE ==="
          find mlx-swift/DerivedData | sed -n '1,500p'
          echo

          echo "=== XCRESULTS ==="
          find . -name '*.xcresult' -print
          echo

          echo "=== XCTEST BUNDLES ==="
          find . -name '*.xctest' -print
          echo

          echo "=== METALLIB FILES ==="
          find . -name '*.metallib' -print
          echo

          echo "=== APPS / BINARIES / DYLIBS ==="
          find . \( -name '*.app' -o -name '*.dylib' -o -perm -111 \) | sed -n '1,400p'
          echo

      - name: Section 9 - smoke project scaffold
        if: always()
        run: |
          set +e
          rm -rf smoke-min
          mkdir -p smoke-min/Sources/SmokeMin

          cat > smoke-min/Package.swift <<'EOF'
          // swift-tools-version: 6.0
          import PackageDescription

          let package = Package(
              name: "SmokeMin",
              platforms: [
                  .macOS(.v14)
              ],
              dependencies: [
                  .package(path: "../mlx-swift")
              ],
              targets: [
                  .executableTarget(
                      name: "SmokeMin",
                      dependencies: [
                          .product(name: "MLX", package: "mlx-swift"),
                          .product(name: "MLXNN", package: "mlx-swift")
                      ],
                      path: "Sources/SmokeMin"
                  )
              ]
          )
          EOF

          cat > smoke-min/Sources/SmokeMin/main.swift <<'EOF'
          import Foundation
          import MLX
          import MLXNN

          func log(_ s: String) {
              print(s)
              fflush(stdout)
          }

          log("=== SMOKE MIN START ===")
          log("Creating arrays")

          let a = MLXArray([1.0, 2.0, 3.0])
          let b = MLXArray([10.0, 20.0, 30.0])

          log("a = \(a)")
          log("b = \(b)")

          let c = a + b
          log("a + b = \(c)")

          let d = a * b
          log("a * b = \(d)")

          let e = matmul(
              MLXArray([[1.0, 2.0], [3.0, 4.0]]),
              MLXArray([[5.0, 6.0], [7.0, 8.0]])
          )
          log("matmul = \(e)")

          let linear = Linear(inputDimensions: 2, outputDimensions: 2)
          let x = MLXArray([[1.0, 2.0]])
          let y = linear(x)
          log("linear(x) = \(y)")

          eval(c, d, e, y)
          log("=== SMOKE MIN END ===")
          EOF

          echo "=== smoke-min tree ==="
          find smoke-min | sed -n '1,200p'

      - name: Section 10 - smoke project resolve
        if: always()
        continue-on-error: true
        working-directory: smoke-min
        run: |
          set +e
          echo "=== swift package describe (smoke-min) ==="
          swift package describe 2>&1 | tee ../smoke-min-describe.log
          echo

          echo "=== swift package resolve (smoke-min) ==="
          swift package resolve 2>&1 | tee ../smoke-min-resolve.log
          status=${PIPESTATUS[0]}
          echo "smoke-min resolve exit status: $status"
          exit 0

      - name: Section 11 - smoke project build
        if: always()
        continue-on-error: true
        working-directory: smoke-min
        run: |
          set +e
          echo "=== swift build -v (smoke-min) ==="
          swift build -v 2>&1 | tee ../smoke-min-build.log
          status=${PIPESTATUS[0]}
          echo "smoke-min build exit status: $status"

          echo
          echo "=== smoke-min .build tree ==="
          find .build | sed -n '1,400p' || true
          exit 0

      - name: Section 12 - smoke project runtime
        if: always()
        continue-on-error: true
        working-directory: smoke-min
        run: |
          set +e
          echo "=== locating SmokeMin binary ==="
          BIN="$(find .build -type f -name SmokeMin | head -n 1)"
          echo "BIN=$BIN"

          echo "=== locating metallib files ==="
          find .build -name '*.metallib' -print

          if [ -z "$BIN" ]; then
            echo "SmokeMin binary not found."
            exit 0
          fi

          if [ ! -x "$BIN" ]; then
            echo "SmokeMin binary exists but is not executable."
            ls -l "$BIN" || true
            exit 0
          fi

          echo "=== running SmokeMin ==="
          "$BIN" 2>&1 | tee ../smoke-min-run.log
          status=${PIPESTATUS[0]}
          echo "SmokeMin runtime exit status: $status"
          exit 0

      - name: Section 13 - non-blocking LM layer probe
        if: always()
        continue-on-error: true
        run: |
          set +e
          echo "=== OPTIONAL LM LAYER PROBE ==="

          if [ -d mlx-swift-lm ]; then
            cd mlx-swift-lm
            echo "Found mlx-swift-lm"
            ls -la
            echo

            echo "=== swift package describe (mlx-swift-lm) ==="
            swift package describe 2>&1 | tee ../mlx-swift-lm-describe.log
            echo

            echo "=== swift build -v (mlx-swift-lm) ==="
            swift build -v 2>&1 | tee ../mlx-swift-lm-build.log
            status=${PIPESTATUS[0]}
            echo "mlx-swift-lm build exit status: $status"
          else
            echo "mlx-swift-lm directory not present. Skipping."
          fi

          exit 0

      - name: Section 14 - final summary
        if: always()
        run: |
          set +e
          echo "=== FINAL SUMMARY ==="
          echo "Proven build step outcome: ${{ steps.proven_build.outcome }}"
          echo "Proven test step outcome:  ${{ steps.proven_test.outcome }}"
          echo
          echo "Key principle: diagnostics continue even after failures."
          echo "Blocking signal is the proven mlx-swift package build/test."
          echo "Everything else is diagnostic and non-blocking."
          echo

          echo "=== LOG FILES ==="
          find . -maxdepth 2 -name '*.log' -print | sort
          echo

      - name: Upload diagnostic artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mlx-swift-ultra-verbose-diagnostics
          if-no-files-found: warn
          path: |
            *.log
            mlx-swift/DerivedData/**
            smoke-min/.build/**
            smoke-min/Package.swift
            smoke-min/Sources/**
            **/*.xcresult
