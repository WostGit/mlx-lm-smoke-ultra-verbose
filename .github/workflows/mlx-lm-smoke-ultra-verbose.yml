name: MLX Swift Primitives Smoke Test (Ultra Verbose)

on:
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: mlx-swift-primitives-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Build and test MLX Swift primitives on macOS
    runs-on: macos-15
    timeout-minutes: 90

    env:
      DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer
      NSUnbufferedIO: "YES"
      SWIFT_BACKTRACE: "enable=yes"
      CLICOLOR: "1"

    steps:
      - name: Check out wrapper repository
        uses: actions/checkout@v5

      - name: Show runner, Swift, and Xcode details
        shell: bash
        run: |
          set -euxo pipefail
          uname -a
          sw_vers
          sysctl -n machdep.cpu.brand_string || true
          xcode-select -p
          xcodebuild -version
          swift --version
          clang --version || true
          pwd
          ls -la

      - name: Clone mlx-swift
        shell: bash
        run: |
          set -euxo pipefail
          git clone --depth=1 https://github.com/ml-explore/mlx-swift.git
          cd mlx-swift
          git rev-parse HEAD
          git status
          git log -1 --stat
          find . -maxdepth 2 -type f | sort | sed -n '1,250p'

      - name: Build mlx-swift package ultra verbosely
        shell: bash
        run: |
          set -euxo pipefail
          cd mlx-swift
          swift package resolve
          swift build -v

      - name: Test mlx-swift package ultra verbosely
        shell: bash
        run: |
          set -euxo pipefail
          cd mlx-swift
          swift test -v

      - name: Run tiny MLX core smoke program
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p smoke-core
          cd smoke-core

          cat > Package.swift <<'SWIFT'
          // swift-tools-version: 6.0
          import PackageDescription

          let package = Package(
              name: "SmokeCore",
              platforms: [
                  .macOS(.v14)
              ],
              dependencies: [
                  .package(url: "https://github.com/ml-explore/mlx-swift.git", branch: "main")
              ],
              targets: [
                  .executableTarget(
                      name: "SmokeCore",
                      dependencies: [
                          .product(name: "MLX", package: "mlx-swift")
                      ]
                  )
              ]
          )
          SWIFT

          mkdir -p Sources/SmokeCore
          cat > Sources/SmokeCore/main.swift <<'SWIFT'
          import MLX

          let a = MLXArray([1.0, 2.0, 3.0])
          let b = MLXArray([4.0, 5.0, 6.0])
          let c = a + b

          print("a:", a)
          print("b:", b)
          print("c:", c)
          print("MLX core smoke test passed.")
          SWIFT

          swift package resolve
          swift run -v

      - name: Clone mlx-swift-lm
        shell: bash
        run: |
          set -euxo pipefail
          git clone --depth=1 https://github.com/ml-explore/mlx-swift-lm.git
          cd mlx-swift-lm
          git rev-parse HEAD
          git status
          git log -1 --stat
          find . -maxdepth 2 -type f | sort | sed -n '1,250p'

      - name: Build mlx-swift-lm package ultra verbosely
        shell: bash
        run: |
          set -euxo pipefail
          cd mlx-swift-lm
          swift package resolve
          swift build -v

      - name: Test mlx-swift-lm package ultra verbosely
        shell: bash
        run: |
          set -euxo pipefail
          cd mlx-swift-lm
          swift test -v

      - name: Run tiny MLX LLM link smoke program
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p smoke-llm
          cd smoke-llm

          cat > Package.swift <<'SWIFT'
          // swift-tools-version: 6.0
          import PackageDescription

          let package = Package(
              name: "SmokeLLM",
              platforms: [
                  .macOS(.v14)
              ],
              dependencies: [
                  .package(url: "https://github.com/ml-explore/mlx-swift-lm.git", branch: "main")
              ],
              targets: [
                  .executableTarget(
                      name: "SmokeLLM",
                      dependencies: [
                          .product(name: "MLXLLM", package: "mlx-swift-lm")
                      ]
                  )
              ]
          )
          SWIFT

          mkdir -p Sources/SmokeLLM
          cat > Sources/SmokeLLM/main.swift <<'SWIFT'
          import Foundation
          import MLXLLM

          print("Imported MLXLLM successfully.")
          print("MLX LLM smoke test passed.")
          SWIFT

          swift package resolve
          swift run -v

      - name: Upload lightweight artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mlx-swift-primitives-artifacts
          if-no-files-found: ignore
          path: |
            mlx-swift/.build
            mlx-swift-lm/.build
            smoke-core/.build
            smoke-llm/.build
