name: MLX Swift Submodule And Metallib Ultra Verbose

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  mlx-swift-main:
    name: MLX Swift main with submodules and metallib diagnostics
    runs-on: macos-15
    timeout-minutes: 150

    env:
      NSUnbufferedIO: "YES"
      PYTHONUNBUFFERED: "1"
      FORCE_COLOR: "1"
      CI: "1"

    steps:
      - name: Checkout workflow repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Toolchain info
        shell: bash
        run: |
          set +e
          mkdir -p logs artifacts

          {
            echo "=== DATE UTC ==="
            date -u
            echo

            echo "=== PWD ==="
            pwd
            echo

            echo "=== sw_vers ==="
            sw_vers
            echo

            echo "=== uname -a ==="
            uname -a
            echo

            echo "=== xcode-select -p ==="
            xcode-select -p
            echo

            echo "=== xcodebuild -version ==="
            xcodebuild -version
            echo

            echo "=== swift --version ==="
            swift --version
            echo

            echo "=== clang --version ==="
            clang --version
            echo

            echo "=== xcrun --show-sdk-path ==="
            xcrun --show-sdk-path
            echo

            echo "=== env | sort ==="
            env | sort
            echo
          } | tee logs/00-toolchain.log

      - name: Clone mlx-swift with submodules
        shell: bash
        run: |
          set -euxo pipefail
          rm -rf mlx-swift

          git clone --depth=1 --recurse-submodules https://github.com/ml-explore/mlx-swift.git mlx-swift
          cd mlx-swift
          git submodule update --init --recursive

          {
            echo "=== HEAD ==="
            git rev-parse HEAD
            echo

            echo "=== LAST COMMIT ==="
            git log -1 --decorate --stat
            echo

            echo "=== SUBMODULE STATUS ==="
            git submodule status --recursive
            echo

            echo "=== TOP LEVEL ==="
            ls -la
            echo
          } | tee ../logs/01-clone.log

      - name: Verify submodule-backed paths
        shell: bash
        run: |
          set +e
          {
            echo "=== IMPORTANT PATHS ==="
            for p in \
              "./mlx-swift/Package.swift" \
              "./mlx-swift/Source/Cmlx" \
              "./mlx-swift/Source/Cmlx/mlx" \
              "./mlx-swift/Source/Cmlx/mlx-c" \
              "./mlx-swift/Source/Cmlx/mlx-conditional/compiled_conditional.cpp" \
              "./mlx-swift/Source/Cmlx/mlx/mlx/backend/cpu/compiled.cpp"
            do
              if [ -e "$p" ]; then
                echo "FOUND: $p"
              else
                echo "MISSING: $p"
              fi
            done
            echo

            echo "=== FIND compiled_conditional.cpp ==="
            find ./mlx-swift -name 'compiled_conditional.cpp' -print
            echo

            echo "=== FIND compiled.cpp ==="
            find ./mlx-swift -path '*backend/cpu/compiled.cpp' -print
            echo

            echo "=== SUBMODULE TREES ==="
            find ./mlx-swift/Source/Cmlx/mlx -maxdepth 4 | sed -n '1,300p'
            echo
            find ./mlx-swift/Source/Cmlx/mlx-c -maxdepth 4 | sed -n '1,300p'
            echo
          } | tee logs/02-submodule-truth.log

      - name: SwiftPM metadata
        shell: bash
        working-directory: mlx-swift
        run: |
          set +e
          swift package describe 2>&1 | tee ../logs/03-swift-package-describe.log
          swift package dump-package 2>&1 | tee ../logs/03-swift-package-dump-package.log
          swift package tools-version 2>&1 | tee ../logs/03-swift-package-tools-version.log
          swift package resolve 2>&1 | tee ../logs/03-swift-package-resolve.log
          swift build -v 2>&1 | tee ../logs/03-swift-build-v.log
          exit 0

      - name: Discover schemes
        id: discover
        shell: bash
        working-directory: mlx-swift
        run: |
          set -o pipefail
          xcodebuild -list 2>&1 | tee ../logs/04-xcodebuild-list.log
          xcodebuild -list -json 2>&1 | tee ../logs/04-xcodebuild-list-json.log

          python3 - <<'PY'
          import json
          import os

          txt = open("../logs/04-xcodebuild-list-json.log", "r", encoding="utf-8", errors="replace").read()
          start = txt.find("{")
          schemes = []
          if start != -1:
              try:
                  obj = json.loads(txt[start:])
                  root = obj.get("project") or obj.get("workspace") or {}
                  schemes = root.get("schemes", []) or []
              except Exception:
                  schemes = []

          with open("../artifacts/schemes.txt", "w", encoding="utf-8") as f:
              for s in schemes:
                  f.write(s + "\n")

          chosen = ""
          for candidate in ["MLXSwiftPackageTests", "mlx-swift-Package"]:
              if candidate in schemes:
                  chosen = candidate
                  break
          if not chosen and schemes:
              chosen = schemes[0]

          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as f:
              f.write(f"CHOSEN_SCHEME={chosen}\n")

          print("schemes =", schemes)
          print("CHOSEN_SCHEME =", chosen)
          PY

      - name: Emit scheme summary
        shell: bash
        run: |
          set +e
          {
            echo "=== SCHEMES ==="
            cat artifacts/schemes.txt 2>/dev/null || true
            echo
            echo "=== CHOSEN_SCHEME ==="
            echo "${CHOSEN_SCHEME:-}"
            echo
          } | tee logs/05-scheme-summary.log

      - name: Build chosen scheme
        if: env.CHOSEN_SCHEME != ''
        shell: bash
        working-directory: mlx-swift
        continue-on-error: true
        run: |
          set +e
          rm -rf DerivedDataBuild

          {
            echo "=== BUILD CHOSEN SCHEME ==="
            echo "SCHEME=$CHOSEN_SCHEME"
            echo
          } | tee ../logs/06-build-intro.log

          xcodebuild \
            -scheme "$CHOSEN_SCHEME" \
            -destination 'platform=macOS,arch=arm64' \
            -derivedDataPath DerivedDataBuild \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            build 2>&1 | tee ../logs/06-build.log

          status=${PIPESTATUS[0]}
          echo "$status" > ../artifacts/build-exit-status.txt
          exit 0

      - name: Test chosen scheme
        if: env.CHOSEN_SCHEME != ''
        shell: bash
        working-directory: mlx-swift
        continue-on-error: true
        run: |
          set +e
          rm -rf DerivedDataTest

          {
            echo "=== TEST CHOSEN SCHEME ==="
            echo "SCHEME=$CHOSEN_SCHEME"
            echo
          } | tee ../logs/07-test-intro.log

          xcodebuild \
            -scheme "$CHOSEN_SCHEME" \
            -destination 'platform=macOS,arch=arm64' \
            -derivedDataPath DerivedDataTest \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            test 2>&1 | tee ../logs/07-test.log

          status=${PIPESTATUS[0]}
          echo "$status" > ../artifacts/test-exit-status.txt
          exit 0

      - name: Extract test summary
        if: always()
        shell: bash
        run: |
          set +e
          python3 - <<'PY'
          import os

          path = "logs/07-test.log"
          out = []
          out.append("=== TEST LOG SUMMARY ===")
          if not os.path.exists(path):
              out.append("test log missing")
          else:
              lines = open(path, "r", encoding="utf-8", errors="replace").read().splitlines()
              hits = []
              for line in lines:
                  if (
                      "** TEST SUCCEEDED **" in line or
                      "** TEST FAILED **" in line or
                      "Executed " in line and " tests" in line or
                      "0 failures" in line or
                      "Testing failed:" in line or
                      "fatal error:" in line or
                      "Invalid Exclude" in line
                  ):
                      hits.append(line)
              out.extend(hits[:200])
          open("artifacts/test-summary.txt", "w", encoding="utf-8").write("\n".join(out) + "\n")
          PY

          cat artifacts/test-summary.txt | tee logs/08-test-summary.log

      - name: Deep metallib and bundle scan
        if: always()
        shell: bash
        run: |
          set +e
          {
            echo "=== FIND ALL METALLIB FILES ==="
            find . -name '*.metallib' -print
            echo

            echo "=== FIND ALL .bundle DIRECTORIES ==="
            find . -name '*.bundle' -type d -print
            echo

            echo "=== FIND mlx-swift_Cmlx.bundle CONTENTS ==="
            find . -name 'mlx-swift_Cmlx.bundle' -type d -exec sh -c 'echo "--- {} ---"; find "{}" | sed -n "1,300p"' \;
            echo

            echo "=== FIND Resources/default.metallib ==="
            find . -path '*Resources/default.metallib' -print
            echo

            echo "=== FIND ANY default.metallib ==="
            find . -name 'default.metallib' -print
            echo

            echo "=== DERIVEDDATA BUILD PRODUCTS ==="
            find mlx-swift/DerivedDataBuild -maxdepth 6 | sed -n '1,500p' || true
            echo

            echo "=== DERIVEDDATA TEST PRODUCTS ==="
            find mlx-swift/DerivedDataTest -maxdepth 6 | sed -n '1,500p' || true
            echo

            echo "=== XCTEST BUNDLES ==="
            find . -name '*.xctest' -print
            echo

            echo "=== XCRESULTS ==="
            find . -name '*.xcresult' -print
            echo
          } | tee logs/09-metallib-scan.log

      - name: Minimal runtime smoke with bundle diagnostics
        if: always()
        shell: bash
        run: |
          set +e
          rm -rf smoke-min
          mkdir -p smoke-min/Sources/SmokeMin

          cat > smoke-min/Package.swift <<'EOF'
          // swift-tools-version: 6.0
          import PackageDescription

          let package = Package(
              name: "SmokeMin",
              platforms: [
                  .macOS(.v14)
              ],
              dependencies: [
                  .package(path: "../mlx-swift")
              ],
              targets: [
                  .executableTarget(
                      name: "SmokeMin",
                      dependencies: [
                          .product(name: "MLX", package: "mlx-swift"),
                          .product(name: "MLXNN", package: "mlx-swift")
                      ],
                      path: "Sources/SmokeMin"
                  )
              ]
          )
          EOF

          cat > smoke-min/Sources/SmokeMin/main.swift <<'EOF'
          import Foundation
          import MLX
          import MLXNN

          func log(_ s: String) {
              print(s)
              fflush(stdout)
          }

          log("=== SMOKE MIN START ===")
          let a = MLXArray([1.0, 2.0, 3.0])
          let b = MLXArray([10.0, 20.0, 30.0])
          log("a = \(a)")
          log("b = \(b)")
          log("a + b = \(a + b)")
          log("a * b = \(a * b)")

          let m = matmul(
              MLXArray([[1.0, 2.0], [3.0, 4.0]]),
              MLXArray([[5.0, 6.0], [7.0, 8.0]])
          )
          log("matmul = \(m)")

          let linear = Linear(inputDimensions: 2, outputDimensions: 2)
          let y = linear(MLXArray([[1.0, 2.0]]))
          log("linear = \(y)")

          eval(m, y)
          log("=== SMOKE MIN END ===")
          EOF

          cd smoke-min
          swift package describe 2>&1 | tee ../logs/10-smoke-describe.log
          swift package resolve 2>&1 | tee ../logs/10-smoke-resolve.log
          swift build -v 2>&1 | tee ../logs/10-smoke-build.log

          BIN="$(find .build -type f -name SmokeMin | head -n 1)"
          echo "BIN=$BIN" | tee ../logs/10-smoke-run.log
          echo "=== FIND .build bundles ===" | tee -a ../logs/10-smoke-run.log
          find .build -name '*.bundle' -type d -print | tee -a ../logs/10-smoke-run.log
          echo "=== FIND .build metallib ===" | tee -a ../logs/10-smoke-run.log
          find .build -name '*.metallib' -print | tee -a ../logs/10-smoke-run.log

          if [ -n "$BIN" ] && [ -x "$BIN" ]; then
            "$BIN" 2>&1 | tee -a ../logs/10-smoke-run.log
          else
            echo "SmokeMin binary missing or not executable" | tee -a ../logs/10-smoke-run.log
          fi

          exit 0

      - name: Final summary
        if: always()
        shell: bash
        run: |
          set +e
          {
            echo "=== FINAL SUMMARY ==="
            echo "CHOSEN_SCHEME=${CHOSEN_SCHEME:-}"
            echo

            echo "=== TEST SUMMARY ==="
            cat artifacts/test-summary.txt 2>/dev/null || true
            echo

            echo "=== LOG FILES ==="
            find logs -type f | sort
            echo

            echo "=== ARTIFACT FILES ==="
            find artifacts -type f | sort
            echo
          } | tee logs/11-final-summary.log

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mlx-swift-submodule-and-metallib-diagnostics
          if-no-files-found: warn
          path: |
            logs/**
            artifacts/**
            mlx-swift/DerivedDataBuild/**
            mlx-swift/DerivedDataTest/**
            smoke-min/.build/**
            smoke-min/Package.swift
            smoke-min/Sources/**
            **/*.xcresult
