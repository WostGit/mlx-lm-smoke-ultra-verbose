name: MLX Swift Submodule And Metallib Ultra Verbose Proof

on:
  workflow_dispatch:
  push:
  pull_request:

jobs:
  mlx-swift-proof:
    name: MLX Swift main with submodules, metallib, and proof diagnostics
    runs-on: macos-15

    timeout-minutes: 90

    env:
      LOG_DIR: logs
      ARTIFACT_DIR: artifacts
      MLX_SWIFT_DIR: mlx-swift
      SMOKE_DIR: smoke-min
      CHOSEN_SCHEME: mlx-swift-Package
      MIN_EXPECTED_TESTS: "500"

    steps:
      - name: Prepare folders
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$LOG_DIR" "$ARTIFACT_DIR"

      - name: Toolchain proof
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "=== TOOLCHAIN ==="
            date -u
            uname -a
            sw_vers
            xcodebuild -version
            swift --version
            xcrun --find swift
            xcrun --find xcodebuild
            xcrun --find metal || true
            xcrun --find metallib || true
          } 2>&1 | tee "$LOG_DIR/00-toolchain.log"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Repository proof
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "=== REPOSITORY PROOF ==="
            echo "GITHUB_REPOSITORY=$GITHUB_REPOSITORY"
            echo "GITHUB_SHA=$GITHUB_SHA"
            echo "GITHUB_REF=$GITHUB_REF"
            echo "PWD=$PWD"
            echo
            echo "=== REMOTES ==="
            git remote -v
            echo
            echo "=== HEAD ==="
            git rev-parse HEAD
            echo
            echo "=== STATUS ==="
            git status --short
            echo
            echo "=== SUBMODULES ==="
            git submodule status --recursive || true
          } 2>&1 | tee "$LOG_DIR/01-repo-proof.log"

          ACTUAL_SHA="$(git rev-parse HEAD)"
          echo "$ACTUAL_SHA" > "$ARTIFACT_DIR/repo-head.txt"

          if [ "$ACTUAL_SHA" != "$GITHUB_SHA" ]; then
            echo "ERROR: checkout SHA mismatch"
            echo "GITHUB_SHA=$GITHUB_SHA"
            echo "ACTUAL_SHA=$ACTUAL_SHA"
            exit 1
          fi

      - name: Clone mlx-swift with submodules
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "=== CLONE MLX SWIFT ==="
            git clone --recursive https://github.com/ml-explore/mlx-swift.git "$MLX_SWIFT_DIR"
            cd "$MLX_SWIFT_DIR"
            echo
            echo "=== MLX SWIFT REMOTE ==="
            git remote -v
            echo
            echo "=== MLX SWIFT HEAD ==="
            git rev-parse HEAD
            echo
            echo "=== MLX SWIFT SUBMODULE STATUS ==="
            git submodule status --recursive
          } 2>&1 | tee "$LOG_DIR/02-clone-mlx-swift.log"

      - name: Swift package diagnostics
        shell: bash
        run: |
          set -euo pipefail
          cd "$MLX_SWIFT_DIR"

          swift package tools-version 2>&1 | tee "../$LOG_DIR/03-swift-package-tools-version.log"
          swift package resolve 2>&1 | tee "../$LOG_DIR/03-swift-package-resolve.log"
          swift package describe 2>&1 | tee "../$LOG_DIR/03-swift-package-describe.log"
          swift package dump-package 2>&1 | tee "../$LOG_DIR/03-swift-package-dump-package.log"

      - name: Xcode scheme diagnostics
        shell: bash
        run: |
          set -euo pipefail
          cd "$MLX_SWIFT_DIR"

          xcodebuild -list 2>&1 | tee "../$LOG_DIR/04-xcodebuild-list.log"
          xcodebuild -list -json 2>&1 | tee "../$LOG_DIR/04-xcodebuild-list-json.log"

          if ! grep -F "$CHOSEN_SCHEME" "../$LOG_DIR/04-xcodebuild-list.log" >/dev/null; then
            echo "ERROR: chosen scheme not found: $CHOSEN_SCHEME"
            exit 1
          fi

          {
            echo "=== SCHEME SUMMARY ==="
            echo "CHOSEN_SCHEME=$CHOSEN_SCHEME"
            echo "SCHEME_FOUND_IN_XCODEBUILD_LIST=YES"
          } | tee "../$LOG_DIR/05-scheme-summary.log"

          echo "$CHOSEN_SCHEME" > "../$ARTIFACT_DIR/schemes.txt"

      - name: Build mlx-swift package
        shell: bash
        run: |
          set -euo pipefail
          cd "$MLX_SWIFT_DIR"

          {
            echo "=== BUILD INTRO ==="
            echo "XCODEBUILD_CMD=xcodebuild build -scheme $CHOSEN_SCHEME -destination platform=macOS"
          } | tee "../$LOG_DIR/06-build-intro.log"

          set +e
          xcodebuild build \
            -scheme "$CHOSEN_SCHEME" \
            -destination 'platform=macOS' \
            2>&1 | tee "../$LOG_DIR/06-build.log"

          BUILD_EXIT="${PIPESTATUS[0]}"
          set -e

          echo "$BUILD_EXIT" | tee "../$ARTIFACT_DIR/build-exit-status.txt"

          if [ "$BUILD_EXIT" -ne 0 ]; then
            echo "ERROR: xcodebuild build failed with exit code $BUILD_EXIT"
            exit "$BUILD_EXIT"
          fi

      - name: Test mlx-swift package and prove real test count
        shell: bash
        run: |
          set -euo pipefail
          cd "$MLX_SWIFT_DIR"

          {
            echo "=== TEST INTRO ==="
            echo "XCODEBUILD_CMD=xcodebuild test -scheme $CHOSEN_SCHEME -destination platform=macOS"
            echo "MIN_EXPECTED_TESTS=$MIN_EXPECTED_TESTS"
          } | tee "../$LOG_DIR/07-test-intro.log"

          set +e
          xcodebuild test \
            -scheme "$CHOSEN_SCHEME" \
            -destination 'platform=macOS' \
            2>&1 | tee "../$LOG_DIR/07-test.log"

          TEST_EXIT="${PIPESTATUS[0]}"
          set -e

          echo "$TEST_EXIT" | tee "../$ARTIFACT_DIR/test-exit-status.txt"

          if [ "$TEST_EXIT" -ne 0 ]; then
            echo "ERROR: xcodebuild test failed with exit code $TEST_EXIT"
            exit "$TEST_EXIT"
          fi

          if ! grep -F "** TEST SUCCEEDED **" "../$LOG_DIR/07-test.log" >/dev/null; then
            echo "ERROR: raw test log does not contain ** TEST SUCCEEDED **"
            exit 1
          fi

          TEST_COUNT="$(
            grep -Eo 'Executed [0-9]+ tests' "../$LOG_DIR/07-test.log" \
              | awk '{sum += $2} END {print sum+0}'
          )"

          echo "TOTAL_EXECUTED_TESTS=$TEST_COUNT" | tee "../$ARTIFACT_DIR/test-summary.txt"

          if [ "$TEST_COUNT" -lt "$MIN_EXPECTED_TESTS" ]; then
            echo "ERROR: Expected at least $MIN_EXPECTED_TESTS executed tests, got $TEST_COUNT"
            exit 1
          fi

          {
            echo "=== TEST LOG SUMMARY ==="
            grep -E 'Executed [0-9]+ tests, with [0-9]+ failures' "../$LOG_DIR/07-test.log" || true
            echo
            echo "RAW_TEST_LOG_CONTAINS_TEST_SUCCEEDED=YES"
            echo "TOTAL_EXECUTED_TESTS=$TEST_COUNT"
            echo "MIN_EXPECTED_TESTS=$MIN_EXPECTED_TESTS"
            echo "TEST_COUNT_OK=YES"
          } | tee "../$LOG_DIR/08-test-summary.log"

      - name: Metallib scan
        shell: bash
        run: |
          set -euo pipefail

          {
            echo "=== METALLIB SCAN ==="
            echo "Searching for metallib files under repo workspace..."
            find "$PWD" -name '*.metallib' -type f -print -exec ls -lh {} \; || true
            echo
            echo "Searching for default.metallib..."
            find "$PWD" -name 'default.metallib' -type f -print -exec ls -lh {} \; || true
          } 2>&1 | tee "$LOG_DIR/09-metallib-scan.log"

          METALLIB_COUNT="$(find "$PWD" -name '*.metallib' -type f | wc -l | tr -d ' ')"
          echo "METALLIB_COUNT=$METALLIB_COUNT" | tee "$ARTIFACT_DIR/metallib-count.txt"

          if [ "$METALLIB_COUNT" -lt 1 ]; then
            echo "ERROR: no .metallib files found"
            exit 1
          fi

      - name: Create deterministic MLX smoke package
        shell: bash
        run: |
          set -euo pipefail

          rm -rf "$SMOKE_DIR"
          mkdir -p "$SMOKE_DIR/Sources/SmokeProbe"

          cat > "$SMOKE_DIR/Package.swift" <<'SWIFT'
          // swift-tools-version: 5.9
          import PackageDescription

          let package = Package(
              name: "SmokeProbe",
              platforms: [
                  .macOS(.v14)
              ],
              dependencies: [
                  .package(path: "../mlx-swift")
              ],
              targets: [
                  .executableTarget(
                      name: "SmokeProbe",
                      dependencies: [
                          .product(name: "MLX", package: "mlx-swift"),
                          .product(name: "MLXRandom", package: "mlx-swift")
                      ]
                  )
              ]
          )
          SWIFT

          cat > "$SMOKE_DIR/Sources/SmokeProbe/main.swift" <<'SWIFT'
          import Foundation
          import MLX
          import MLXRandom

          func fail(_ message: String) -> Never {
              print("MLX_SMOKE_FAILURE=\(message)")
              exit(1)
          }

          let args = CommandLine.arguments
          let expectWrongResult = args.contains("--expect-wrong-result")

          print("MLX_SMOKE_BEGIN=YES")

          let a = MLXArray([Float(1), Float(2), Float(3)])
          let b = MLXArray([Float(10), Float(20), Float(30)])
          let c = a + b
          eval(c)

          let cValues = c.asArray(Float.self)
          print("MLX_SMOKE_RESULT=\(cValues)")

          let expectedVector: [Float] = expectWrongResult
              ? [Float(999), Float(999), Float(999)]
              : [Float(11), Float(22), Float(33)]

          if cValues != expectedVector {
              if expectWrongResult {
                  print("NEGATIVE_CONTROL_EXPECTED_FAILURE=YES")
              }
              fail("vector mismatch expected \(expectedVector), got \(cValues)")
          }

          let x = MLXArray(Array(repeating: Float(1), count: 1024), [32, 32])
          let y = matmul(x, x)
          eval(y)

          let yValues = y.asArray(Float.self)
          print("MLX_MATMUL_FIRST=\(yValues[0])")
          print("MLX_MATMUL_COUNT=\(yValues.count)")

          if yValues.count != 1024 {
              fail("matmul count mismatch")
          }

          if abs(yValues[0] - Float(32)) > Float(0.0001) {
              fail("matmul first mismatch")
          }

          print("MLX_SMOKE_RESULT_OK=YES")
          print("MLX_MATMUL_RESULT_OK=YES")
          print("MLX_SMOKE_END=YES")
          SWIFT

          {
            echo "=== SMOKE PACKAGE CREATED ==="
            find "$SMOKE_DIR" -maxdepth 4 -type f -print
            echo
            cat "$SMOKE_DIR/Package.swift"
            echo
            cat "$SMOKE_DIR/Sources/SmokeProbe/main.swift"
          } 2>&1 | tee "$LOG_DIR/10-smoke-describe.log"

      - name: Resolve and build smoke package
        shell: bash
        run: |
          set -euo pipefail
          cd "$SMOKE_DIR"

          swift package resolve 2>&1 | tee "../$LOG_DIR/10-smoke-resolve.log"

          set +e
          swift build -v 2>&1 | tee "../$LOG_DIR/10-smoke-build.log"
          SMOKE_BUILD_EXIT="${PIPESTATUS[0]}"
          set -e

          echo "$SMOKE_BUILD_EXIT" | tee "../$ARTIFACT_DIR/smoke-build-exit-status.txt"

          if [ "$SMOKE_BUILD_EXIT" -ne 0 ]; then
            echo "ERROR: smoke build failed with exit code $SMOKE_BUILD_EXIT"
            exit "$SMOKE_BUILD_EXIT"
          fi

      - name: Run deterministic MLX smoke proof
        shell: bash
        run: |
          set -euo pipefail
          cd "$SMOKE_DIR"

          set +e
          swift run SmokeProbe 2>&1 | tee "../$LOG_DIR/10-smoke-run.log"
          SMOKE_RUN_EXIT="${PIPESTATUS[0]}"
          set -e

          echo "$SMOKE_RUN_EXIT" | tee "../$ARTIFACT_DIR/smoke-run-exit-status.txt"

          if [ "$SMOKE_RUN_EXIT" -ne 0 ]; then
            echo "ERROR: smoke run failed with exit code $SMOKE_RUN_EXIT"
            exit "$SMOKE_RUN_EXIT"
          fi

          grep -F "MLX_SMOKE_BEGIN=YES" "../$LOG_DIR/10-smoke-run.log"
          grep -F "MLX_SMOKE_RESULT=[11.0, 22.0, 33.0]" "../$LOG_DIR/10-smoke-run.log"
          grep -F "MLX_MATMUL_FIRST=32.0" "../$LOG_DIR/10-smoke-run.log"
          grep -F "MLX_MATMUL_COUNT=1024" "../$LOG_DIR/10-smoke-run.log"
          grep -F "MLX_SMOKE_RESULT_OK=YES" "../$LOG_DIR/10-smoke-run.log"
          grep -F "MLX_MATMUL_RESULT_OK=YES" "../$LOG_DIR/10-smoke-run.log"
          grep -F "MLX_SMOKE_END=YES" "../$LOG_DIR/10-smoke-run.log"

      - name: Negative control proves harness fails bad result
        shell: bash
        run: |
          set -euo pipefail
          cd "$SMOKE_DIR"

          set +e
          swift run SmokeProbe --expect-wrong-result 2>&1 | tee "../$LOG_DIR/10-negative-control.log"
          NEG_EXIT="${PIPESTATUS[0]}"
          set -e

          echo "$NEG_EXIT" | tee "../$ARTIFACT_DIR/negative-control-exit-status.txt"

          if [ "$NEG_EXIT" -eq 0 ]; then
            echo "ERROR: negative control unexpectedly passed"
            exit 1
          fi

          grep -F "NEGATIVE_CONTROL_EXPECTED_FAILURE=YES" "../$LOG_DIR/10-negative-control.log"

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "=== SHA256 CHECKSUMS ==="
            shasum -a 256 "$LOG_DIR"/*.log "$ARTIFACT_DIR"/* 2>/dev/null || true
          } | tee "$ARTIFACT_DIR/checksums.sha256"

          test -s "$ARTIFACT_DIR/checksums.sha256"

      - name: Final proof summary
        shell: bash
        run: |
          set -euo pipefail

          REPO_HEAD="$(cat "$ARTIFACT_DIR/repo-head.txt")"
          TEST_COUNT="$(grep -Eo 'TOTAL_EXECUTED_TESTS=[0-9]+' "$ARTIFACT_DIR/test-summary.txt" | tail -1 | cut -d= -f2)"
          METALLIB_COUNT="$(cat "$ARTIFACT_DIR/metallib-count.txt")"
          BUILD_EXIT="$(cat "$ARTIFACT_DIR/build-exit-status.txt")"
          TEST_EXIT="$(cat "$ARTIFACT_DIR/test-exit-status.txt")"
          SMOKE_BUILD_EXIT="$(cat "$ARTIFACT_DIR/smoke-build-exit-status.txt")"
          SMOKE_RUN_EXIT="$(cat "$ARTIFACT_DIR/smoke-run-exit-status.txt")"
          NEG_EXIT="$(cat "$ARTIFACT_DIR/negative-control-exit-status.txt")"

          {
            echo "=== FINAL SUMMARY ==="
            echo "CHOSEN_SCHEME=$CHOSEN_SCHEME"
            echo
            echo "=== PROOF SUMMARY ==="
            echo "REPO_HEAD=$REPO_HEAD"
            echo "GITHUB_SHA=$GITHUB_SHA"
            echo "SHA_MATCH=YES"
            echo
            echo "SCHEME=$CHOSEN_SCHEME"
            echo "SCHEME_FOUND_IN_XCODEBUILD_LIST=YES"
            echo
            echo "XCODEBUILD_BUILD_EXIT=$BUILD_EXIT"
            echo "XCODEBUILD_TEST_EXIT=$TEST_EXIT"
            echo "RAW_TEST_LOG_CONTAINS_TEST_SUCCEEDED=YES"
            echo "TOTAL_EXECUTED_TESTS=$TEST_COUNT"
            echo "MIN_EXPECTED_TESTS=$MIN_EXPECTED_TESTS"
            echo "TEST_COUNT_OK=YES"
            echo
            echo "METALLIB_COUNT=$METALLIB_COUNT"
            echo "METALLIB_FOUND=YES"
            echo
            echo "SMOKE_BUILD_EXIT=$SMOKE_BUILD_EXIT"
            echo "SMOKE_RUN_EXIT=$SMOKE_RUN_EXIT"
            echo "MLX_SMOKE_RESULT_OK=YES"
            echo "MLX_MATMUL_RESULT_OK=YES"
            echo
            echo "NEGATIVE_CONTROL_EXIT=$NEG_EXIT"
            echo "NEGATIVE_CONTROL_PROVED_FAILURE=YES"
            echo
            echo "CHECKSUM_FILE=$ARTIFACT_DIR/checksums.sha256"
            echo "FINAL_STATUS=PROVEN_SUCCESS"
            echo
            echo "=== LOG FILES ==="
            find "$LOG_DIR" -maxdepth 1 -type f | sort
            echo
            echo "=== ARTIFACT FILES ==="
            find "$ARTIFACT_DIR" -maxdepth 1 -type f | sort
          } | tee "$LOG_DIR/11-final-summary.log"

      - name: Upload proof artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mlx-swift-proof-${{ github.sha }}
          path: |
            logs/
            artifacts/
