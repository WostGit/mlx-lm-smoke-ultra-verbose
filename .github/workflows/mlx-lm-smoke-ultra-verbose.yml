name: MLX Swift Qwen2 Text Smoke

on:
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: mlx-swift-qwen2-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: MLX Swift Qwen2 text smoke on macOS
    runs-on: macos-15
    timeout-minutes: 90

    env:
      DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer
      NSUnbufferedIO: "YES"
      CLICOLOR: "1"

    steps:
      - name: Check out wrapper repository
        uses: actions/checkout@v5

      - name: Show runner and toolchain info
        shell: bash
        run: |
          set -euxo pipefail
          uname -a
          sw_vers
          sysctl -n machdep.cpu.brand_string || true
          xcode-select -p
          xcodebuild -version
          swift --version
          pwd
          ls -la

      - name: Clone mlx-swift with submodules
        shell: bash
        run: |
          set -euxo pipefail
          git clone --recursive https://github.com/ml-explore/mlx-swift.git
          cd mlx-swift
          git rev-parse HEAD
          git submodule status
          test -f Source/Cmlx/mlx/mlx/backend/cpu/compiled.cpp

      - name: Run upstream mlx-swift package tests
        shell: bash
        run: |
          set -euxo pipefail
          cd mlx-swift
          xcodebuild \
            test \
            -scheme mlx-swift-Package \
            -destination 'platform=macOS' \
            -derivedDataPath "$PWD/DerivedData" \
            -resultBundlePath "$PWD/MLXSwiftPackageTests.xcresult" \
            -showBuildTimingSummary

      - name: Create Qwen text-only smoke package
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p smoke-qwen
          cd smoke-qwen

          cat > Package.swift <<'SWIFT'
          // swift-tools-version: 6.0
          import PackageDescription

          let package = Package(
              name: "SmokeQwen",
              platforms: [.macOS(.v14)],
              dependencies: [
                  .package(url: "https://github.com/ml-explore/mlx-swift-lm", .upToNextMajor(from: "3.31.3")),
                  .package(url: "https://github.com/DePasqualeOrg/swift-tokenizers-mlx", from: "0.2.0", traits: ["Swift"]),
                  .package(url: "https://github.com/DePasqualeOrg/swift-hf-api-mlx", from: "0.2.0")
              ],
              targets: [
                  .executableTarget(
                      name: "SmokeQwen",
                      dependencies: [
                          .product(name: "MLXLLM", package: "mlx-swift-lm"),
                          .product(name: "MLXLMCommon", package: "mlx-swift-lm"),
                          .product(name: "MLXLMTokenizers", package: "swift-tokenizers-mlx"),
                          .product(name: "MLXLMHFAPI", package: "swift-hf-api-mlx")
                      ]
                  )
              ]
          )
          SWIFT

          mkdir -p Sources/SmokeQwen
          cat > Sources/SmokeQwen/main.swift <<'SWIFT'
          import Foundation
          import MLXLLM
          import MLXLMCommon
          import MLXLMTokenizers
          import MLXLMHFAPI

          @main
          struct SmokeQwen {
              static func main() async throws {
                  print("Starting Qwen text-only smoke test.")
                  print("About to load mlx-community/Qwen2.5-0.5B-Instruct-4bit")

                  let model = try await loadModel(
                      from: HubApi.default,
                      using: TokenizersLoader(),
                      id: "mlx-community/Qwen2.5-0.5B-Instruct-4bit"
                  )

                  let session = ChatSession(model)
                  let response = try await session.respond(to: "Reply with exactly OK")

                  print("=== RESPONSE BEGIN ===")
                  print(response)
                  print("=== RESPONSE END ===")

                  if response.trimmingCharacters(in: .whitespacesAndNewlines).isEmpty {
                      throw NSError(domain: "SmokeQwen", code: 1, userInfo: [NSLocalizedDescriptionKey: "Empty response"])
                  }

                  print("Qwen text-only smoke test passed.")
              }
          }
          SWIFT

      - name: Resolve Qwen smoke package
        shell: bash
        run: |
          set -euxo pipefail
          cd smoke-qwen
          swift package resolve

      - name: Build Qwen smoke package
        shell: bash
        run: |
          set -euxo pipefail
          cd smoke-qwen
          swift build -v

      - name: Run Qwen smoke package
        shell: bash
        run: |
          set -euxo pipefail
          cd smoke-qwen
          swift run -v

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mlx-swift-qwen2-smoke-artifacts
          if-no-files-found: ignore
          path: |
            mlx-swift/MLXSwiftPackageTests.xcresult
            smoke-qwen/.build
