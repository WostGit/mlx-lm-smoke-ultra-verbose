name: MLX LM Smoke Tests (Ultra Verbose)

on:
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: mlx-lm-smoke-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Smoke tests on macOS
    runs-on: macos-15
    timeout-minutes: 120

    env:
      PYTHONUNBUFFERED: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      FORCE_COLOR: "1"
      HF_HOME: ${{ github.workspace }}/.hf-home
      HF_HUB_DISABLE_TELEMETRY: "1"
      TRANSFORMERS_VERBOSITY: info
      TOKENIZERS_PARALLELISM: "false"
      PYTEST_ADDOPTS: >-
        -vvv
        -s
        --full-trace
        --tb=long
        -rA
        --durations=25
        --maxfail=1
        --showlocals
        --color=yes
        -o log_cli=true
        -o log_cli_level=DEBUG

    steps:
      - name: Check out wrapper repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Show runner details
        shell: bash
        run: |
          set -euxo pipefail
          uname -a
          sw_vers
          sysctl -n machdep.cpu.brand_string || true
          xcodebuild -version || true
          python --version
          python -m pip --version
          which python
          which pip
          pwd
          ls -la

      - name: Clone MLX LM repository
        shell: bash
        run: |
          set -euxo pipefail
          git clone --depth=1 https://github.com/ml-explore/mlx-lm.git
          cd mlx-lm
          git rev-parse HEAD
          git status
          ls -la
          find . -maxdepth 2 -type f | sort | sed -n '1,300p'

      - name: Upgrade packaging tools
        shell: bash
        run: |
          set -euxo pipefail
          python -m pip install --upgrade pip setuptools wheel

      - name: Install MLX LM and test dependencies
        shell: bash
        run: |
          set -euxo pipefail
          cd mlx-lm
          python -m pip install pytest pytest-xdist pytest-timeout unittest-xml-reporting
          python -m pip install -e ".[test]"
          python -m pip list

      - name: Download MLX LM test fixtures
        shell: bash
        run: |
          set -euxo pipefail
          cd mlx-lm
          curl --fail --show-error --location \
            --output test_data.zip \
            https://github.com/ml-explore/mlx-lm/releases/download/test_data/test_data.zip
          unzip -o test_data.zip
          ls -lah
          find tests -type f | sort

      - name: Run smoke tests ultra verbosely
        shell: bash
        run: |
          set -euo pipefail
          cd mlx-lm

          echo "=== Smoke selection strategy ==="
          echo "1) Upstream pytest marker: -m smoke"
          echo "2) Upstream name filter: -k smoke"
          echo "3) Explicit portable fallback smoke suite"
          echo

          run_pytest() {
            echo ">>> python -m pytest $*"
            python -m pytest "$@"
          }

          # Try real upstream smoke markers first.
          set +e
          run_pytest tests -m smoke
          rc=$?
          set -e

          if [ "$rc" -eq 0 ]; then
            echo "Smoke tests passed via pytest marker selection."
            exit 0
          fi

          if [ "$rc" -ne 5 ]; then
            echo "Marker-based smoke run failed with exit code: $rc"
            exit "$rc"
          fi

          echo "No marker-based smoke tests collected."

          # Try name-based smoke selection.
          set +e
          run_pytest tests -k "smoke or test_smoke or smoke_test"
          rc=$?
          set -e

          if [ "$rc" -eq 0 ]; then
            echo "Smoke tests passed via name-based selection."
            exit 0
          fi

          if [ "$rc" -ne 5 ]; then
            echo "Name-based smoke run failed with exit code: $rc"
            exit "$rc"
          fi

          echo "No name-based smoke tests collected."
          echo "Using explicit fallback smoke suite."

          # Portable, explicit fallback suite:
          # - fast
          # - broad enough to catch major regressions
          # - avoids bash-only mapfile and avoids guessing filenames dynamically
          FALLBACK_SUITE="
          tests/test_chat.py
          tests/test_sample_utils.py
          tests/test_tokenizers.py
          tests/test_tool_parsing.py
          tests/test_losses.py
          tests/test_prompt_cache.py
          tests/test_server.py
          tests/test_utils.py
          tests/test_generate.py
          "

          echo "=== Fallback smoke files ==="
          printf '%s\n' "$FALLBACK_SUITE"

          for f in $FALLBACK_SUITE; do
            if [ ! -f "$f" ]; then
              echo "Missing expected fallback smoke file: $f" >&2
              exit 1
            fi
          done

          run_pytest $FALLBACK_SUITE

      - name: Show full test collection on failure
        if: failure()
        shell: bash
        run: |
          set -euxo pipefail
          cd mlx-lm
          python -m pytest tests --collect-only -vv || true

      - name: Upload lightweight artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mlx-lm-smoke-artifacts
          if-no-files-found: ignore
          path: |
            mlx-lm/.pytest_cache
