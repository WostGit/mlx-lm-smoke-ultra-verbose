name: MLX Swift Qwen2.5 0.5B Working Smoke

on:
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: mlx-swift-qwen-working-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  qwen-smoke:
    name: Run Qwen2.5 0.5B via mlx-run on macOS
    runs-on: macos-15
    timeout-minutes: 90

    env:
      DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer
      NSUnbufferedIO: "YES"
      CLICOLOR: "1"
      HF_HOME: ${{ github.workspace }}/.hf-home
      XDG_CACHE_HOME: ${{ github.workspace }}/.cache

    steps:
      - name: Check out wrapper repository
        uses: actions/checkout@v5

      - name: Show runner and toolchain info
        shell: bash
        run: |
          set -euxo pipefail
          uname -a
          sw_vers
          sysctl -n machdep.cpu.brand_string || true
          xcode-select -p
          xcodebuild -version
          swift --version
          pwd
          ls -la

      - name: Prepare cache directories
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p "$HF_HOME" "$XDG_CACHE_HOME"
          du -sh "$HF_HOME" || true
          du -sh "$XDG_CACHE_HOME" || true

      - name: Clone mlx-swift-examples
        shell: bash
        run: |
          set -euxo pipefail
          git clone --recursive https://github.com/ml-explore/mlx-swift-examples.git
          cd mlx-swift-examples
          git rev-parse HEAD
          git status
          git log -1 --stat
          test -x mlx-run
          test -d Tools/llm-tool

      - name: Show available schemes
        shell: bash
        run: |
          set -euxo pipefail
          cd mlx-swift-examples
          xcodebuild -list

      - name: Show llm-tool help through mlx-run
        shell: bash
        run: |
          set -euxo pipefail
          cd mlx-swift-examples
          ./mlx-run llm-tool --help | sed -n '1,240p'

      - name: Run Qwen2.5 0.5B smoke through mlx-run
        shell: bash
        run: |
          set -euxo pipefail
          cd mlx-swift-examples

          ./mlx-run llm-tool \
            generate \
            --model mlx-community/Qwen2.5-0.5B-Instruct-4bit \
            --prompt "Reply with exactly OK" \
            --max-tokens 8 \
            2>&1 | tee qwen-smoke.log

      - name: Assert response contains OK
        shell: bash
        run: |
          set -euxo pipefail
          cd mlx-swift-examples
          grep -E '(^|[^A-Z])OK([^A-Z]|$)' qwen-smoke.log

      - name: Show cache summary
        if: always()
        shell: bash
        run: |
          set -euxo pipefail
          du -sh "$HF_HOME" || true
          find "$HF_HOME" -maxdepth 4 | sort | sed -n '1,300p' || true

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mlx-swift-qwen-working-smoke-artifacts
          if-no-files-found: ignore
          path: |
            mlx-swift-examples/qwen-smoke.log
            .hf-home
