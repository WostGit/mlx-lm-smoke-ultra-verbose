name: MLX Swift Ultra Verbose What-Works Matrix

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  mlx-swift-ultra-verbose:
    name: MLX Swift ultra verbose what-works on macOS
    runs-on: macos-15
    timeout-minutes: 90

    env:
      NSUnbufferedIO: "YES"
      PYTHONUNBUFFERED: "1"
      TERM: xterm-256color
      FORCE_COLOR: "1"
      CI: "1"

    steps:
      - name: Checkout current repo
        uses: actions/checkout@v5

      - name: Runner / Xcode / Swift environment
        shell: bash
        run: |
          set -euxo pipefail
          echo "=== DATE ==="
          date -u
          echo "=== UNAME ==="
          uname -a
          echo "=== SW_VERS ==="
          sw_vers
          echo "=== XCODE SELECT ==="
          xcode-select -p
          echo "=== XCODEBUILD VERSION ==="
          xcodebuild -version
          echo "=== SWIFT VERSION ==="
          swift --version
          echo "=== CLANG VERSION ==="
          clang --version || true
          echo "=== AVAILABLE SDKS ==="
          xcodebuild -showsdks
          echo "=== CURRENT DIRECTORY ==="
          pwd
          echo "=== REPO CONTENTS ==="
          ls -la

      - name: Clone upstream repos
        shell: bash
        run: |
          set -euxo pipefail
          git clone --depth=1 https://github.com/ml-explore/mlx-swift.git
          git clone --depth=1 https://github.com/ml-explore/mlx-swift-lm.git
          git clone --depth=1 https://github.com/ml-explore/mlx-swift-examples.git
          echo "=== CLONED REPOS ==="
          ls -la
          echo "=== mlx-swift HEAD ==="
          git -C mlx-swift rev-parse HEAD
          echo "=== mlx-swift-lm HEAD ==="
          git -C mlx-swift-lm rev-parse HEAD
          echo "=== mlx-swift-examples HEAD ==="
          git -C mlx-swift-examples rev-parse HEAD

      - name: Inspect repo layouts
        shell: bash
        run: |
          set -euxo pipefail
          echo "=== mlx-swift top level ==="
          (cd mlx-swift && find . -maxdepth 2 | sort | sed -n '1,240p')
          echo "=== mlx-swift-lm top level ==="
          (cd mlx-swift-lm && find . -maxdepth 2 | sort | sed -n '1,240p')
          echo "=== mlx-swift-examples top level ==="
          (cd mlx-swift-examples && find . -maxdepth 2 | sort | sed -n '1,300p')

      - name: Discover Xcode workspaces / projects / schemes
        shell: bash
        run: |
          set -euxo pipefail

          echo "=== XCODE FILES IN mlx-swift ==="
          (cd mlx-swift && find . \( -name '*.xcodeproj' -o -name '*.xcworkspace' \) | sort || true)

          echo "=== XCODE FILES IN mlx-swift-lm ==="
          (cd mlx-swift-lm && find . \( -name '*.xcodeproj' -o -name '*.xcworkspace' \) | sort || true)

          echo "=== XCODE FILES IN mlx-swift-examples ==="
          (cd mlx-swift-examples && find . \( -name '*.xcodeproj' -o -name '*.xcworkspace' \) | sort || true)

          echo "=== SCHEMES IN mlx-swift ==="
          (
            cd mlx-swift
            if [ -f Package.swift ]; then
              xcodebuild -list 2>&1 | tee ../mlx-swift-xcodebuild-list.log || true
            fi
          )

          echo "=== SCHEMES IN mlx-swift-examples ==="
          (
            cd mlx-swift-examples
            if [ -d . ]; then
              xcodebuild -list 2>&1 | tee ../mlx-swift-examples-xcodebuild-list.log || true
            fi
          )

      - name: SwiftPM resolve for mlx-swift
        shell: bash
        run: |
          set -euxo pipefail
          cd mlx-swift
          echo "=== swift package describe ==="
          swift package describe 2>&1 | tee ../mlx-swift-package-describe.log || true
          echo "=== swift package resolve ==="
          swift package resolve 2>&1 | tee ../mlx-swift-package-resolve.log

      - name: Run mlx-swift package tests (blocking)
        shell: bash
        run: |
          set -euxo pipefail
          cd mlx-swift

          echo "=== BUILDING/TESTING mlx-swift PACKAGE ==="
          echo "Using package-generated Xcode scheme because this is the proven working layer."

          xcodebuild \
            -scheme mlx-swift-Package \
            -destination "platform=macOS,arch=arm64" \
            -derivedDataPath DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            test \
            2>&1 | tee ../mlx-swift-package-test.log

      - name: Summarize mlx-swift test result
        shell: bash
        run: |
          set -euxo pipefail
          echo "=== MLX SWIFT TEST SUMMARY ==="
          grep -E "(\*\* TEST SUCCEEDED \*\*|Executed [0-9]+ tests, with 0 failures)" mlx-swift-package-test.log || true
          echo "=== XCRESULT PATHS ==="
          find mlx-swift/DerivedData -name "*.xcresult" | sort || true

      - name: SwiftPM resolve and build mlx-swift-lm (blocking)
        shell: bash
        run: |
          set -euxo pipefail
          cd mlx-swift-lm
          echo "=== swift package describe (mlx-swift-lm) ==="
          swift package describe 2>&1 | tee ../mlx-swift-lm-package-describe.log || true
          echo "=== swift package resolve (mlx-swift-lm) ==="
          swift package resolve 2>&1 | tee ../mlx-swift-lm-package-resolve.log
          echo "=== swift build -v (mlx-swift-lm) ==="
          swift build -v 2>&1 | tee ../mlx-swift-lm-build.log

      - name: Inspect mlx-swift-examples entry points
        shell: bash
        run: |
          set -euxo pipefail
          cd mlx-swift-examples

          echo "=== README snippets mentioning LLM examples ==="
          grep -RniE "llm-tool|LLMBasic|LLMEval|VLMEval" . | sed -n '1,200p' || true

          echo "=== Swift package files ==="
          find . -maxdepth 3 -name "Package.swift" -o -name "Package.resolved" | sort || true

          echo "=== Xcode schemes / list output ==="
          xcodebuild -list 2>&1 | tee ../mlx-swift-examples-list.log || true

          echo "=== Look for mlx-run helper ==="
          find . -maxdepth 3 -name "mlx-run" -type f | sort || true

          echo "=== Look for llm-tool references ==="
          grep -Rni "llm-tool" . | sed -n '1,200p' || true

      - name: Best-effort build of mlx-swift-examples project graph (non-blocking)
        shell: bash
        continue-on-error: true
        run: |
          set -euxo pipefail
          cd mlx-swift-examples

          rm -rf DerivedData || true

          echo "=== ATTEMPT: xcodebuild -list ==="
          xcodebuild -list 2>&1 | tee ../mlx-swift-examples-list-attempt.log || true

          echo "=== ATTEMPT: build llm-tool directly if scheme exists ==="
          if grep -q "llm-tool" ../mlx-swift-examples-list-attempt.log; then
            xcodebuild \
              -scheme llm-tool \
              -destination "platform=macOS,arch=arm64" \
              -configuration Debug \
              -derivedDataPath DerivedData \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGNING_REQUIRED=NO \
              build \
              2>&1 | tee ../mlx-swift-examples-llm-tool-build.log || true
          else
            echo "llm-tool scheme not found in xcodebuild -list output"
          fi

          echo "=== DEBUG PRODUCTS ==="
          find DerivedData -path "*Build/Products/*" | sort | sed -n '1,300p' || true

      - name: Experimental end-to-end probe (non-blocking)
        shell: bash
        continue-on-error: true
        run: |
          set -euxo pipefail
          cd mlx-swift-examples

          echo "=== PROBE: try mlx-run helper if present ==="
          if [ -x ./mlx-run ]; then
            ./mlx-run --debug llm-tool --help 2>&1 | tee ../mlx-run-help.log || true
            ./mlx-run --debug llm-tool generate \
              --model mlx-community/Qwen2.5-0.5B-Instruct-4bit \
              --prompt "Reply with exactly OK" \
              --max-tokens 8 \
              2>&1 | tee ../mlx-run-qwen.log || true
          else
            echo "mlx-run helper not found or not executable" | tee ../mlx-run-qwen.log
          fi

          echo "=== PROBE: direct built binary if present ==="
          BIN_CANDIDATE="$(find DerivedData -type f -name llm-tool | head -n 1 || true)"
          echo "BIN_CANDIDATE=${BIN_CANDIDATE}"
          if [ -n "${BIN_CANDIDATE}" ] && [ -x "${BIN_CANDIDATE}" ]; then
            "${BIN_CANDIDATE}" --help 2>&1 | tee ../llm-tool-help.log || true
            "${BIN_CANDIDATE}" generate \
              --model mlx-community/Qwen2.5-0.5B-Instruct-4bit \
              --prompt "Reply with exactly OK" \
              --max-tokens 8 \
              2>&1 | tee ../llm-tool-qwen.log || true
          else
            echo "No runnable llm-tool binary found" | tee ../llm-tool-qwen.log
          fi

      - name: Final harsh summary
        shell: bash
        run: |
          set -euxo pipefail

          echo "=== FINAL SUMMARY ==="

          if grep -q "\*\* TEST SUCCEEDED \*\*" mlx-swift-package-test.log; then
            echo "[PASS] mlx-swift package tests passed"
          else
            echo "[FAIL] mlx-swift package tests did not pass"
            exit 1
          fi

          if [ -f mlx-swift-lm-build.log ]; then
            if grep -q "Build complete" mlx-swift-lm-build.log || grep -q "Build complete!" mlx-swift-lm-build.log; then
              echo "[PASS] mlx-swift-lm SwiftPM build passed"
            else
              echo "[WARN] mlx-swift-lm build log exists but no explicit success marker found"
            fi
          else
            echo "[WARN] mlx-swift-lm build log missing"
          fi

          if [ -f mlx-swift-examples-llm-tool-build.log ]; then
            if grep -q "\*\* BUILD SUCCEEDED \*\*" mlx-swift-examples-llm-tool-build.log; then
              echo "[PASS] llm-tool example build passed"
            else
              echo "[WARN] llm-tool example build did not pass"
            fi
          else
            echo "[WARN] no llm-tool example build log produced"
          fi

          if [ -f ../mlx-run-qwen.log ]; then
            true
          fi

          if grep -RqiE '(^|[^A-Z])OK([^A-Z]|$)' . ../*qwen*.log 2>/dev/null; then
            echo "[PASS] end-to-end Qwen smoke appears to have produced OK"
          else
            echo "[WARN] end-to-end Qwen smoke did not produce OK"
          fi

          echo "=== WHAT THIS MEANS ==="
          echo "1. Core MLX Swift must pass."
          echo "2. MLX Swift LM library build should ideally pass."
          echo "3. Example/CLI runtime is diagnostic and may fail independently."
          echo "4. This workflow is intentionally ultra-verbose so failure point is obvious."

      - name: Upload all logs and result bundles
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mlx-swift-ultra-verbose-logs
          path: |
            *.log
            mlx-swift/**/*.xcresult
            mlx-swift/**/DerivedData/**/Logs/**
            mlx-swift-examples/**/DerivedData/**/Logs/**
            mlx-swift/DerivedData/**
            mlx-swift-examples/DerivedData/**
            mlx-swift-lm/.build/**
          if-no-files-found: warn
          compression-level: 0
